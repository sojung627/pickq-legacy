#MyBatis
mybatis.type-aliases-package=com.springbootstudy.bbs.domain
mybatis.mapper-locations=classpath:mappers/**/*Mapper.xml
mybatis.configuration.map-underscore-to-camel-case=true

#한글 처리
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

#정적 파일 변경 실시간 반영
spring.devtools.remote.restart.enabled=false
spring.devtools.livereload.enabled=true

#Thymeleaf 뷰 설정 - prefix와 suffix는 아래 경로가 기본 값임
#spring.thymeleaf.prefix=classpath:/templates/
#spring.thymeleaf.suffix=.html
#spring.thymeleaf.view-names=views/*
# thymeleaf에 대한 캐시를 남기지 않음, cache=false 설정(운영시는 true)
spring.thymeleaf.cache=false
#Thymeleaf 사용 활성화
#spring.thymeleaf.enabled=true
#렌더링 전에 템플릿 존재여부 확인 옵션
#spring.thymeleaf.check-template=false
#template 위치 존재여부 확인 옵션 - 없으면 오류 발생
#spring.thymeleaf.check-template-location=true

# 파일 업로드 제한 - 개별 파일 최대 100MB
spring.servlet.multipart.max-file-size=100MB
# 전체 요청 최대 업로드 용량 512MB
spring.servlet.multipart.max-request-size=512MB

# 로그인 유지 시간 = 1시간
server.servlet.session.timeout=60m

# 서버 재시작 시 세션 정보를 파일로 저장해서 로그인 상태를 유지함
server.servlet.session.persistent=true

# ===== Error handling hardening (demo-safe) =====
# Disable Spring Boot whitelabel error page.
server.error.whitelabel.enabled=false
# Keep all MVC errors routed to the custom /error controller.
server.error.path=/error
# Never expose internal exception details to the client.
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
