<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
	<th:block th:fragment="header">

		<header class="sticky top-0 z-50 bg-white border-b border-gray-200">
			<div id="notification-context" th:if="${session.loginUser != null}"
				th:attr="data-mem-idx=${session.loginUser.memIdx}"></div>

			<div class="max-w-7xl mx-auto px-4">
				<div class="grid grid-cols-12 h-16 items-center gap-4">

					<!-- Logo -->
					<div class="col-span-6 md:col-span-3">
						<a th:href="@{/}" class="flex items-center gap-3"> <img
							th:src="@{/images/common/pickQ_logo.png}" alt="PickQ 로고"
							class="h-8 w-auto" />
						</a>
					</div>

					<!-- Desktop GNB -->
					<nav
						class="hidden md:flex col-span-6 items-center justify-center gap-2">
						<a th:href="@{/auctions}"
							class="px-4 py-2 text-[16px] font-medium text-[#222222] hover:text-[#7CBD00] rounded transition-colors">
							경매 </a> <a th:href="@{/boards}"
							class="px-4 py-2 text-[16px] font-medium text-[#222222] hover:text-[#7CBD00] rounded transition-colors">
							커뮤니티 </a> <a th:href="@{/mypage/auctions}"
							class="px-4 py-2 text-[16px] font-medium text-[#222222] hover:text-[#7CBD00] rounded transition-colors">
							마이페이지 </a> <a th:href="@{/support/guide}"
							class="px-4 py-2 text-[16px] font-medium text-[#222222] hover:text-[#7CBD00] rounded transition-colors">
							고객지원 </a>
					</nav>

					<!-- Right actions -->
					<div
						class="col-span-6 md:col-span-3 flex items-center justify-end gap-3">

						<!-- 로그인 O (데스크탑) -->
						<div class="hidden md:flex items-center gap-3"
							th:if="${session.loginUser != null}">

							<!-- 알림 -->
							<div id="notification-menu-wrap" class="relative">
								<button type="button" id="notification-menu-trigger"
									class="relative w-11 h-11 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center"
									aria-label="알림">
									<i data-feather="bell" class="w-5 h-5 text-[#222222]"></i> <span
										id="notification-bell-dot" data-notification-bell-dot
										class="hidden absolute top-1 right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>
									<span id="notification-bell-badge" data-notification-bell-badge
										class="hidden absolute -top-1 -right-1 min-w-5 h-5 px-1 rounded-full bg-red-500 text-white text-[10px] font-semibold leading-5 text-center border-2 border-white">0</span>
								</button>

								<div id="notification-hover-menu"
									class="hidden absolute right-0 top-11 w-[320px] bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden">
									<div class="px-4 py-3 border-b border-gray-100">
										<p class="text-sm font-semibold text-[#222222]">최근 알림</p>
									</div>
									<div id="notification-recent-list"
										class="max-h-[280px] overflow-y-auto divide-y divide-gray-100"></div>
									<div class="px-4 py-3 bg-gray-50 border-t border-gray-100">
										<a th:href="@{/notifications}"
											class="w-full inline-flex items-center justify-center px-3 py-2 rounded-lg bg-[#222222] text-white text-xs font-semibold hover:bg-[#333333] transition-colors">
											알람 전체보기 </a>
									</div>
								</div>
							</div>

							<!-- 내 정보 -->
							<a th:href="@{/mypage/profile}"
								class="w-11 h-11 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center"
								aria-label="내 계정"> <i data-feather="user"
								class="w-5 h-5 text-[#222222]"></i>
							</a>

							<!-- 로그아웃 -->
							<form th:action="@{/members/logout}" method="post" class="m-0">
								<button type="submit"
									class="inline-flex items-center px-4 py-2 rounded text-[16px] bg-[#222222] text-white font-semibold hover:bg-[#6BAD00] border-0 transition-colors">
									<i data-feather="log-out" class="w-5 h-5 mr-2"></i> 로그아웃
								</button>
							</form>
						</div>

						<!-- 로그인 X (데스크탑) -->
						<div class="hidden md:flex items-center gap-2"
							th:if="${session.loginUser == null}">
							<a href="javascript:void(0);"
								onclick="location.href='/members/login?redirect=' + encodeURIComponent(location.pathname + location.search)"
								class="px-4 py-2 rounded text-[16px] text-[#222222] hover:text-[#7CBD00] transition-colors">
								로그인 </a> <a th:href="@{/members/register}"
								class="px-4 py-2 rounded text-[16px] bg-[#7CBD00] text-white font-semibold hover:bg-[#6BAD00] transition-colors">
								회원가입 </a>
						</div>

						<!-- 모바일 액션 -->
						<div class="md:hidden flex items-center justify-end gap-2 w-full">

							<!-- 로그인 O -->
							<th:block th:if="${session.loginUser != null}">
								<a th:href="@{/notifications}"
									class="relative w-10 h-10 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center"
									aria-label="알림"> <i data-feather="bell"
									class="w-5 h-5 text-[#222222]"></i> <span
									data-notification-bell-dot
									class="hidden absolute top-1 right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>
									<span data-notification-bell-badge
									class="hidden absolute -top-1 -right-1 min-w-5 h-5 px-1 rounded-full bg-red-500 text-white text-[10px] font-semibold leading-5 text-center border-2 border-white">0</span>
								</a>

								<a th:href="@{/mypage/profile}"
									class="w-10 h-10 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center"
									aria-label="내 계정"> <i data-feather="user"
									class="w-5 h-5 text-[#222222]"></i>
								</a>
							</th:block>

							<!-- 로그인 X -->
							<th:block th:if="${session.loginUser == null}">
								<a href="javascript:void(0);"
									onclick="location.href='/members/login?redirect=' + encodeURIComponent(location.pathname + location.search)"
									class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-semibold bg-[#7CBD00] text-white hover:bg-[#6BAD00] transition-colors">
									로그인 </a>
							</th:block>

							<!-- 햄버거 -->
							<button onclick="openMobileNav()"
								class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors"
								aria-label="메뉴 열기">
								<i class="bi bi-list text-[#222222] text-2xl"></i>
							</button>
						</div>

					</div>
				</div>
			</div>
		</header>

		<script>
        if (window.feather) {
            feather.replace();
        }

        (function() {
            const menuWrap = document.getElementById('notification-menu-wrap');
            const hoverMenu = document.getElementById('notification-hover-menu');
            const recentList = document.getElementById('notification-recent-list');
            let hideTimer = null;

            if (!menuWrap || !hoverMenu || !recentList) {
                return;
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text == null ? '' : String(text);
                return div.innerHTML;
            }

            function formatDate(value) {
                if (!value) {
                    return '';
                }
                const parsed = new Date(value);
                if (Number.isNaN(parsed.getTime())) {
                    return String(value).replace('T', ' ').slice(0, 16);
                }
                const month = String(parsed.getMonth() + 1).padStart(2, '0');
                const day = String(parsed.getDate()).padStart(2, '0');
                const hour = String(parsed.getHours()).padStart(2, '0');
                const minute = String(parsed.getMinutes()).padStart(2, '0');
                return month + '/' + day + ' ' + hour + ':' + minute;
            }

            function renderRecent(notifications) {
                if (!Array.isArray(notifications) || notifications.length === 0) {
                    recentList.innerHTML = '<div class="px-4 py-6 text-xs text-gray-400 text-center">최근 알림이 없습니다.</div>';
                    return;
                }

                recentList.innerHTML = notifications.slice(0, 2).map(function(item) {
                    const targetUrl = item.targetUrl ? item.targetUrl : '/notifications';
                    const isUnread = item.isRead !== 'Y';
                    const dot = isUnread
                        ? '<span class="w-2 h-2 rounded-full bg-red-500 mt-1"></span>'
                        : '<span class="w-2 h-2 rounded-full bg-gray-300 mt-1"></span>';

                    return ''
                        + '<a href="' + escapeHtml(targetUrl) + '" class="block px-4 py-3 hover:bg-gray-50 transition-colors">'
                        + '  <div class="flex items-start gap-2">'
                        + dot
                        + '    <div class="min-w-0 flex-1">'
                        + '      <p class="text-xs font-semibold text-[#222222] truncate">' + escapeHtml(item.notificationTitle || '알림') + '</p>'
                        + '      <p class="text-xs text-gray-600 truncate mt-0.5">' + escapeHtml(item.notificationMessage || '') + '</p>'
                        + '      <p class="text-[11px] text-gray-400 mt-1">' + escapeHtml(formatDate(item.createdAt)) + '</p>'
                        + '    </div>'
                        + '  </div>'
                        + '</a>';
                }).join('');
            }

            function loadRecentNotifications() {
                fetch('/notifications/recent?limit=2', {
                    method: 'GET',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    return response.json();
                })
                .then(function(data) {
                    renderRecent(data);
                })
                .catch(function() {
                    recentList.innerHTML = '<div class="px-4 py-6 text-xs text-gray-400 text-center">알림을 불러오지 못했습니다.</div>';
                });
            }

            function openMenu() {
                if (hideTimer) {
                    clearTimeout(hideTimer);
                    hideTimer = null;
                }
                hoverMenu.classList.remove('hidden');
                loadRecentNotifications();
            }

            function closeMenuDelay() {
                hideTimer = setTimeout(function() {
                    hoverMenu.classList.add('hidden');
                }, 140);
            }

            menuWrap.addEventListener('mouseenter', openMenu);
            menuWrap.addEventListener('mouseleave', closeMenuDelay);
        })();
    </script>

		<div th:replace="~{fragments/mobile-nav :: mobileNav}"></div>

	</th:block>
</body>
</html>
