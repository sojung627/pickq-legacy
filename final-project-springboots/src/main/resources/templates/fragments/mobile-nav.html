<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="mobileNav">

  <!-- 모바일 드로어 오버레이 -->
  <div id="mobileNavOverlay"
       class="fixed inset-0 bg-black/40 z-40 hidden md:hidden"
       onclick="closeMobileNav()"></div>

  <!-- 모바일 드로어 패널 -->
  <div id="mobileNavDrawer"
       class="fixed top-0 right-0 h-full w-72 bg-white z-50 shadow-xl
              transform translate-x-full transition-transform duration-300 ease-in-out md:hidden">

    <!-- 드로어 헤더 -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
      <span class="text-lg font-bold text-[#222222]">PickQ</span>
      <button onclick="closeMobileNav()"
              class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
        <i class="bi bi-x-lg text-[#222222] text-lg"></i>
      </button>
    </div>

    <!-- 로그인 상태 영역 -->
    <div class="px-5 py-4 border-b border-gray-100">
      <!-- 로그인 O -->
      <div th:if="${session.loginUser != null}" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
          <i class="bi bi-person-fill text-[#767676] text-lg"></i>
        </div>
        <div>
          <p class="text-sm font-semibold text-[#222222]"
             th:text="${session.loginUser.memName}">사용자</p>
          <p class="text-xs text-[#767676]">환영합니다!</p>
        </div>
      </div>
      <!-- 로그인 X -->
      <div th:if="${session.loginUser == null}" class="flex gap-2">
        <a href="#"
           onclick="closeMobileNav(); location.href='/members/login?redirect=' + encodeURIComponent(location.href)"
           class="flex-1 text-center py-2.5 rounded-lg border border-gray-300 text-sm font-semibold text-[#222222] hover:bg-gray-50">
          로그인
        </a>
        <a th:href="@{/members/register}"
           onclick="closeMobileNav()"
           class="flex-1 text-center py-2.5 rounded-lg bg-[#7CBD00] text-sm font-semibold text-white hover:bg-[#6BAD00]">
          회원가입
        </a>
      </div>
    </div>

    <!-- 메인 메뉴 -->
    <nav class="px-3 py-3">
      <a th:href="@{/auctions}"
         onclick="closeMobileNav()"
         class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-[15px] font-medium text-[#222222] hover:bg-gray-50 transition-colors">
        <i class="bi bi-hammer text-[#7CBD00] text-lg w-6 text-center"></i>
        <span>경매</span>
      </a>
      <a th:href="@{/boards}"
         onclick="closeMobileNav()"
         class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-[15px] font-medium text-[#222222] hover:bg-gray-50 transition-colors">
        <i class="bi bi-chat-square-text text-[#7CBD00] text-lg w-6 text-center"></i>
        <span>커뮤니티</span>
      </a>
      <a th:href="@{/mypage/auctions}"
         onclick="closeMobileNav()"
         class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-[15px] font-medium text-[#222222] hover:bg-gray-50 transition-colors">
        <i class="bi bi-person-circle text-[#7CBD00] text-lg w-6 text-center"></i>
        <span>마이페이지</span>
      </a>
      <a th:href="@{/support/guide}"
         onclick="closeMobileNav()"
         class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-[15px] font-medium text-[#222222] hover:bg-gray-50 transition-colors">
        <i class="bi bi-headset text-[#7CBD00] text-lg w-6 text-center"></i>
        <span>고객지원</span>
      </a>
    </nav>

    <!-- 로그아웃 (로그인 상태일 때만) -->
    <div th:if="${session.loginUser != null}"
         class="absolute bottom-0 left-0 right-0 px-5 py-5 border-t border-gray-100">
      <form th:action="@{/members/logout}" method="post">
        <button type="submit"
                class="w-full py-3 rounded-xl border border-gray-300 text-sm font-semibold text-[#767676] hover:bg-gray-50 transition-colors">
          <i class="bi bi-box-arrow-right me-2"></i>로그아웃
        </button>
      </form>
    </div>

  </div>

  <script>
    function openMobileNav() {
      document.getElementById('mobileNavDrawer').classList.remove('translate-x-full');
      document.getElementById('mobileNavOverlay').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    function closeMobileNav() {
      document.getElementById('mobileNavDrawer').classList.add('translate-x-full');
      document.getElementById('mobileNavOverlay').classList.add('hidden');
      document.body.style.overflow = '';
    }
    // ESC 키로 닫기
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeMobileNav();
    });
  </script>

</th:block>
</body>
</html>
