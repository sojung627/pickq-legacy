<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PickQ</title>

<!-- favicon -->
<link rel="shortcut icon" href="/images/common/pickQ_favicon.ico" type="image/x-icon">

<!-- Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">


    <!-- 공통 CSS -->
    <link rel="stylesheet" th:href="@{/css/common.css}">

<!-- Bootstrap -->
<link th:href="@{/bootstrap/bootstrap.min.css}" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
   href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Tailwind (테스트용) -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>
<script>
/*   tailwind.config = {
    corePlugins: {
      preflight: false  // Tailwind reset이 기존 스타일 덮어쓰는 것 방지
    }
  } */
</script>

<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/js/formcheck.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/toast.js}"></script>
<script th:src="@{/js/notificationSocket.js}" defer></script>
<script th:src="@{/js/chatPopup.js}" defer></script>
</head>
<body class="min-h-screen flex flex-col">
   <div class="container flex-1 flex flex-col">

      <!-- header -->
      <div th:replace="~{fragments/header :: header}"></div>

      <script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>

      <!-- content : 요청마다 교체되는 부분 -->
      <div layout:fragment="content" class="mb-6"></div>

      <!-- footer -->
      <div class="mt-10"></div>
      <div th:replace="~{fragments/footer :: footer}" class="mt-10"></div>

	</div>
	<!-- floating-buttons -->
   <div th:replace="~{fragments/floating-buttons :: floating-buttons}"></div>
</body>
</html>
