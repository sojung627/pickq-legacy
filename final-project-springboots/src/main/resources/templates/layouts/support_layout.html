<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PickQ - 고객지원</title>

<!-- Pretendard -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

<!-- 공통 CSS -->
<link rel="stylesheet" th:href="@{/css/common.css}">

<!-- favicon -->
<link rel="shortcut icon" href="/images/common/pickQ_favicon.ico" type="image/x-icon">

<!-- Bootstrap -->
<link th:href="@{/bootstrap/bootstrap.min.css}" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
   href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Tailwind (테스트용) -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>
<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/js/formcheck.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/notificationSocket.js}" defer></script>
<script th:src="@{/js/chatPopup.js}" defer></script>
</head>
<body class="font-['Pretendard']">
   <div class="container">

      <!-- header -->
      <div th:replace="~{fragments/header :: header}"></div>

      <script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>

      <!-- 공통 고객지원 레이아웃 -->
      <div class="min-h-screen bg-[#ffffff]">
         <div class="mx-auto max-w-[1200px] px-4 sm:px-6 py-8">

            <!-- 상단 헤더 -->
				<header class="mb-4 py-3 px-3 sm:py-10">
					<div
						class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
						<div>
							<h1 class="text-2xl sm:text-3xl font-bold text-[#222222] mb-1">고객지원</h1>
							<p class="text-sm text-[#767676]">언제나 고객을 최우선으로 여기겠습니다.</p>
						</div>
					</div>
				</header>

               <div class="flex flex-col gap-6 lg:flex-row lg:gap-8">
               <!-- Left Sidebar - Menu -->
                  <aside class="w-full lg:w-60 lg:flex-shrink-0">
                     <div class="bg-white border border-gray-100 sticky top-24 overflow-hidden rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.03)]">
                        <button id="support-sidebar-toggle" type="button"
                           class="lg:hidden w-full flex items-center justify-between px-4 py-3 border-b border-gray-100 text-sm font-semibold text-[#222222]"
                           aria-expanded="false"
                           aria-controls="support-sidebar-body"
                           onclick="toggleSupportSidebarAccordion()">
                           <span>고객지원 메뉴</span>
                           <i class="bi bi-chevron-down text-[#767676] transition-transform duration-300"
                              id="support-sidebar-icon"></i>
                        </button>
                        <div class="hidden lg:block px-4 py-3 border-b border-gray-100">
                           <h3 class="font-semibold text-[#222222]">고객지원</h3>
                        </div>
                        <div id="support-sidebar-body"
                           class="overflow-hidden transition-[max-height] duration-300 ease-in-out max-h-0 lg:max-h-none lg:overflow-visible">

                        <!-- 헤더 -->
                           <div class="px-4 py-3 border-b border-gray-100 lg:hidden">
                           <h3 class="font-semibold text-[#222222]">카테고리</h3>
                        </div>

                        <!-- 내비게이션 -->
                        <nav class="flex flex-col px-2 py-2 text-sm">
                           <!-- 이용안내 -->
                           <a th:href="@{/support/guide}"
                              class="block rounded-lg px-4 py-3 text-sm font-semibold leading-5 transition-colors"
                              th:classappend="${activeSupportMenu == 'guide'} ?
                                   ' bg-gray-100 text-[#222222] font-semibold'
                                   : ' text-[#767676] font-semibold hover:bg-gray-50 hover:text-[#222222]'">
                              이용안내
                           </a>

                           <!-- 자주 묻는 질문 -->
                           <a th:href="@{/support/faq}"
                              class="block rounded-lg px-4 py-3 text-sm font-semibold leading-5 transition-colors"
                              th:classappend="${activeSupportMenu == 'faq'} ?
                                   ' bg-gray-100 text-[#222222] font-semibold'
                                   : ' text-[#767676] font-semibold hover:bg-gray-50 hover:text-[#222222]'">
                              자주 묻는 질문
                           </a>

                           <!-- 고객문의 -->
                           <a th:href="@{/support/inquiry}"
                              class="block rounded-lg px-4 py-3 text-sm font-semibold leading-5 transition-colors"
                              th:classappend="${activeSupportMenu == 'inquiry'} ?
                                   ' bg-gray-100 text-[#222222] font-semibold'
                                   : ' text-[#767676] font-semibold hover:bg-gray-50 hover:text-[#222222]'">
                              고객문의
                           </a>
                        </nav>

                        <!-- Contact Info -->
                        <div class="px-4 pb-4 pt-3 border-t border-gray-100">
                           <h3 class="mb-2 text-xs font-semibold text-[#222222]">문의하기</h3>
                           <div class="space-y-2 text-xs text-[#767676]">
                              <div>
                                 <p>📧 이메일</p>
                                 <p class="text-[#7CBD00] font-medium">support@pickq.com</p>
                              </div>
                              <div class="mt-3">
                                 <p>📞 고객센터</p>
                                 <p class="text-[#7CBD00] font-medium">1588-0000</p>
                                 <p class="text-[11px] text-[#999999]">평일 09:00 - 18:00</p>
                              </div>
                           </div>
                        </div>

                        </div>
                  </div>
               </aside>

               <!-- 오른쪽 영역: 각 고객지원 페이지에서 채워 넣는 부분 -->
                  <main class="flex-1 min-w-0" layout:fragment="content">
                  <!-- 개별 페이지에서 오버라이드 -->
               </main>
            </div>
         </div>
      </div>

      <!-- footer -->
      <div class="mt-10"></div>
      <div th:replace="~{fragments/footer :: footer}"></div>

	</div>
	<!-- floating-buttons -->
	<div th:replace="fragments/floating-buttons :: floating-buttons"></div>
   <script>
      function toggleSupportSidebarAccordion() {
         var toggle = document.getElementById('support-sidebar-toggle');
         var body = document.getElementById('support-sidebar-body');
         var icon = document.getElementById('support-sidebar-icon');

         if (!toggle || !body) return;

         var isExpanded = toggle.getAttribute('aria-expanded') === 'true';
         if (isExpanded) {
            body.style.maxHeight = body.scrollHeight + 'px';
            requestAnimationFrame(function () {
               body.style.maxHeight = '0px';
            });
            toggle.setAttribute('aria-expanded', 'false');
            if (icon) icon.style.transform = 'rotate(0deg)';
         } else {
            body.style.maxHeight = body.scrollHeight + 'px';
            body.addEventListener('transitionend', function handler() {
               body.style.maxHeight = 'none';
               body.removeEventListener('transitionend', handler);
            });
            toggle.setAttribute('aria-expanded', 'true');
            if (icon) icon.style.transform = 'rotate(180deg)';
         }
      }

      document.addEventListener('DOMContentLoaded', function () {
         var toggle = document.getElementById('support-sidebar-toggle');
         var body = document.getElementById('support-sidebar-body');
         if (!toggle || !body) return;
         if (window.innerWidth < 1024) {
            body.style.maxHeight = '0px';
            toggle.setAttribute('aria-expanded', 'false');
         }
      });
   </script>
</body>
</html>
