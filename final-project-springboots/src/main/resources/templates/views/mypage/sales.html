<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">
<head>
<meta charset="UTF-8">
<title>내 판매 내역 - PickQ</title>
</head>
<body>
	<div layout:fragment="content">

		<div
			class="bg-white border border-gray-100 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.03)] overflow-hidden">
			<!-- 헤더 -->
			<div class="px-6 py-5 border-b border-gray-100">
				<h2 class="text-lg sm:text-xl font-semibold text-[#222222]">내
					판매 내역</h2>
				<p class="mt-1 text-xs sm:text-sm text-[#767676]">역경매에서 판매한 거래의
					결제/배송 상태를 확인하고 배송 처리를 할 수 있습니다.</p>
			</div>

			<!-- 본문 -->
			<div class="px-4 py-4 sm:px-6 sm:py-5">

				<!-- 비어있을 때 -->
				<div th:if="${#lists.isEmpty(sales)}"
					class="py-10 text-center text-sm text-gray-400 border border-dashed border-gray-200 rounded-lg">
					판매 내역이 없습니다.</div>

				<!-- 판매 카드 목록 -->
				<div th:if="${!#lists.isEmpty(sales)}" class="space-y-3">

					<!-- 각 판매 카드 -->
					<div th:each="sale : ${sales}"
						class="rounded-xl border border-gray-200 bg-[#ffffff] px-4 py-4 sm:px-5 sm:py-4">

						<!-- 상단: 상품명 + 배송상태 -->
						<div class="flex items-start justify-between gap-2">
							<div class="min-w-0 flex-1">
								<h3
									class="text-sm sm:text-lg font-semibold text-[#222222] leading-snug break-words"
									th:text="${sale.itemName}">상품명</h3>
								<p class="mt-0.5 text-[11px] text-gray-500"
									th:text="|결제일 ${#temporals.format(sale.payRegdate, 'yyyy-MM-dd HH:mm')}|">
									결제일</p>
							</div>

							<span
								class="inline-flex shrink-0 items-center rounded-full px-2.5 py-1 text-[11px] sm:text-xs font-semibold"
								th:classappend="${sale.deliveryStatus == 'SHIPPING'}
                                            ? ' bg-blue-100 text-blue-700'
                                            : (${sale.deliveryStatus == 'DELIVERED'}
                                                ? ' bg-gray-200 text-gray-700'
                                                : ' bg-[#e8f4cc] text-[#6ea800]')"
								th:text="${sale.deliveryStatus == 'SHIPPING'}
                                     ? '배송중'
                                     : (${sale.deliveryStatus == 'DELIVERED'}
                                        ? '구매확정 완료'
                                        : '배송준비중')">
								배송준비중 </span>
						</div>

						<!-- 본문 정보 -->
						<div class="mt-3 grid grid-cols-2 lg:grid-cols-4 gap-x-4 gap-y-3">

							<div>
								<div class="text-[11px] text-gray-400">결제 금액</div>
								<div
									class="mt-0.5 text-sm sm:text-base font-bold text-[#222222]"
									th:text="${#numbers.formatInteger(sale.payAmount, 0, 'COMMA') + '원'}">
									0원</div>
							</div>

							<div>
								<div class="text-[11px] text-gray-400">구매자 이름</div>
								<div class="mt-0.5 text-sm text-gray-700"
									th:text="${sale.buyerName}">구매자명</div>
							</div>

							<div>
								<div class="text-[11px] text-gray-400">연락처</div>
								<div class="mt-0.5 text-sm text-gray-700 break-words"
									th:text="${sale.buyerTel}">010-0000-0000</div>
							</div>

							<div>
								<div class="text-[11px] text-gray-400">택배사</div>
								<div class="mt-0.5 text-sm text-gray-700"
									th:text="${sale.courierCompany != null ? sale.courierCompany : '-'}">
									-</div>
							</div>

							<div>
								<div class="text-[11px] text-gray-400">운송장번호</div>
								<div class="mt-0.5 text-sm text-gray-700 break-words"
									th:text="${sale.trackingNumber != null ? sale.trackingNumber : '-'}">
									-</div>
							</div>

							<div>
								<div class="text-[11px] text-gray-400">배송 상태</div>
								<div class="mt-0.5 text-sm text-gray-700"
									th:text="${sale.deliveryStatus != null ? sale.deliveryStatus : '배송준비중'}">
									배송준비중</div>
							</div>

							<!-- 주소 -->
							<div class="col-span-2 lg:col-span-4">
								<div class="text-[11px] text-gray-400">배송지</div>
								<div class="mt-0.5 text-sm text-gray-700 break-words"
									th:text="${sale.buyerAddr + ' ' + sale.buyerZipcode}">주소
								</div>
							</div>
						</div>

						<!-- 하단: 안내 + 배송 처리 -->
						<div
							class="mt-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
							<div class="text-[11px] text-gray-500">판매자는 운송장 등록 후 배송을
								시작할 수 있습니다.</div>

							<div class="flex justify-end">
								<button th:if="${sale.deliveryStatus == null}"
									th:attr="data-bid-idx=${sale.bidIdx}"
									onclick="openShipModal(this)" type="button"
									class="px-3 py-1.5 rounded-lg bg-[#7CBD00] text-white text-[11px] sm:text-xs font-semibold hover:bg-[#6BAD00] transition-colors">
									운송장 입력</button>

								<span th:if="${sale.deliveryStatus == 'SHIPPING'}"
									class="inline-flex items-center rounded-lg bg-blue-50 px-3 py-1.5 text-[11px] sm:text-xs font-semibold text-blue-600">
									배송중 </span> <span th:if="${sale.deliveryStatus == 'DELIVERED'}"
									class="inline-flex items-center rounded-lg bg-gray-100 px-3 py-1.5 text-[11px] sm:text-xs font-semibold text-gray-700">
									구매확정 완료 </span>
							</div>
						</div>

					</div>
				</div>
			</div>
		</div>

		<!-- 운송장 입력 모달 -->
		<div id="shipModal" class="hidden fixed inset-0 z-[9999] p-4">

			<!-- 배경 오버레이 -->
			<div class="absolute inset-0 bg-black/40" onclick="closeShipModal()"></div>

			<!-- 모달 박스 -->
			<div
				class="relative mx-auto mt-[10vh] w-full max-w-md rounded-xl bg-white shadow-xl border border-gray-200 p-5 sm:p-6">
				<h3 class="text-base sm:text-lg font-semibold text-[#222222] mb-4">운송장
					정보 입력</h3>
				<input type="hidden" id="modalBidIdx" />

				<div class="mb-4">
					<label class="block mb-1.5 text-sm text-gray-700">택배사</label> <select
						id="courierCompany"
						class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
						<option value="CJ대한통운">CJ대한통운</option>
						<option value="한진택배">한진택배</option>
						<option value="롯데택배">롯데택배</option>
						<option value="우체국택배">우체국택배</option>
						<option value="로젠택배">로젠택배</option>
					</select>
				</div>

				<div class="mb-5">
					<label class="block mb-1.5 text-sm text-gray-700">운송장번호</label> <input
						type="text" id="trackingNumber" placeholder="운송장번호 입력"
						class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#7CBD00]" />
				</div>

				<div class="flex justify-end gap-2">
					<button type="button" onclick="closeShipModal()"
						class="px-4 py-2 rounded-lg border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50 transition-colors">
						취소</button>
					<button type="button" onclick="submitShipping()"
						class="px-4 py-2 rounded-lg bg-[#7CBD00] text-white text-sm font-semibold hover:bg-[#6BAD00] transition-colors">
						배송 시작</button>
				</div>
			</div>
		</div>

		<script>
      function openShipModal(btn) {
        const bidIdx = btn.getAttribute("data-bid-idx");
        const modal = document.getElementById("shipModal");
        const trackingInput = document.getElementById("trackingNumber");
        const courierSelect = document.getElementById("courierCompany");

        document.getElementById("modalBidIdx").value = bidIdx;
        trackingInput.value = "";
        courierSelect.selectedIndex = 0;

        modal.classList.remove("hidden");
        modal.classList.add("flex", "items-center", "justify-center");
        document.body.classList.add("overflow-hidden");
      }

      function closeShipModal() {
        const modal = document.getElementById("shipModal");
        modal.classList.remove("flex", "items-center", "justify-center");
        modal.classList.add("hidden");
        document.body.classList.remove("overflow-hidden");
      }

      function submitShipping() {
        const bidIdx = document.getElementById("modalBidIdx").value;
        const courierCompany = document.getElementById("courierCompany").value;
        const trackingNumber = document.getElementById("trackingNumber").value;

        if (!trackingNumber.trim()) {
          alert("운송장번호를 입력해주세요.");
          return;
        }

        fetch("/api/payment/ship", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            bidIdx: bidIdx,
            courierCompany: courierCompany,
            trackingNumber: trackingNumber
          })
        })
          .then(res => {
            if (!res.ok) {
              return res.text().then(text => { throw new Error(text); });
            }
            return res.json();
          })
          .then(data => {
            alert("배송 처리가 완료되었습니다!");
            closeShipModal();
            location.reload();
          })
          .catch(err => {
            alert("오류가 발생했습니다: " + err.message);
          });
      }

      document.addEventListener("keydown", function (e) {
        const modal = document.getElementById("shipModal");
        if (e.key === "Escape" && !modal.classList.contains("hidden")) {
          closeShipModal();
        }
      });
    </script>

	</div>
</body>
</html>
