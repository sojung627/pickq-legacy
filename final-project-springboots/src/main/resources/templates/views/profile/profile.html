<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title>프로필</title>
</head>
<body>
<th:block layout:fragment="content">
  <section class="max-w-7xl mx-auto px-4 py-6 md:py-8">
    <div class="mb-4 md:mb-6">
      <a th:if="${profileBackUrl != null}" th:href="${profileBackUrl}"
         class="inline-flex items-center gap-2 text-sm text-gray-600 hover:text-gray-900">
        <span>←</span><span>뒤로</span>
      </a>
      <a th:if="${profileBackUrl == null}" href="#" onclick="history.back(); return false;"
         class="inline-flex items-center gap-2 text-sm text-gray-600 hover:text-gray-900">
        <span>←</span><span>뒤로</span>
      </a>
    </div>

    <h1 class="text-xl md:text-2xl font-bold text-gray-900 mb-4 md:mb-6">
      <span th:text="${profile.maskedMemId}">ab***z</span> 님의 프로필
    </h1>

    <article class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 md:p-6">
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 md:gap-6">
        <div class="flex flex-col items-center gap-2">
          <div class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-gray-100 border border-gray-200 overflow-hidden flex items-center justify-center">
            <img th:if="${profile.memImg != null and profile.memImg != ''}"
                 th:src="@{'/images/profile/' + ${profile.memImg}}"
                 alt="프로필 이미지" class="w-full h-full object-cover">
            <span th:if="${profile.memImg == null or profile.memImg == ''}" class="text-3xl text-gray-400">👤</span>
          </div>
          <button type="button"
                  th:if="${profileChatroomIdx != null and session.loginUser != null and session.loginUser.memIdx != profile.memIdx}"
                  th:onclick="|openChatPopup(${profileChatroomIdx})|"
                  class="inline-flex items-center gap-1 rounded-lg bg-[#222222] px-3 py-1.5 text-xs font-semibold text-white hover:bg-[#333333] transition-colors">
            <i class="bi bi-chat-dots"></i>
            대화하기
          </button>
        </div>

        <div class="flex-1 w-full">
          <div class="flex flex-wrap items-center gap-2 mb-2">
              <img th:if="${profile.gradeName != null and profile.gradeName != '' and #strings.toLowerCase(profile.gradeName) != 'basic' and #strings.toLowerCase(profile.gradeName) != 'normal'}"
                 th:src="@{'/images/common/icon_' + ${#strings.toLowerCase(profile.gradeName)} + '.png'}"
                 alt="grade"
                 class="w-5 h-5 object-contain">
            <h2 class="text-lg md:text-xl font-semibold text-gray-900"
                th:text="${profile.memNickname != null and profile.memNickname != '' ? profile.memNickname : profile.maskedMemId}">닉네임</h2>
          </div>

          <p class="text-sm md:text-base text-gray-600 leading-relaxed min-h-[2.25rem]"
             th:text="${profile.memIntro != null and profile.memIntro != '' ? profile.memIntro : '소개글이 아직 없습니다.'}">소개글이 아직 없습니다.</p>

          <div class="mt-3 flex flex-wrap items-center gap-4 text-sm text-gray-500">
            <span>평균 별점 <strong class="text-amber-600" th:text="${#numbers.formatDecimal(profile.avgRating != null ? profile.avgRating : 0, 1, 1)}">0.0</strong></span>
            <span>리뷰 <strong th:text="${profile.reviewCount != null ? profile.reviewCount : 0}">0</strong>개</span>
          </div>
        </div>
      </div>
    </article>

    <section class="mt-8">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg md:text-xl font-bold text-gray-900">거래 후기</h3>
      </div>

      <div class="space-y-3" th:if="${reviews != null and !#lists.isEmpty(reviews)}">
        <article th:each="review : ${reviews}" class="bg-white rounded-xl border border-gray-200 p-4 md:p-5 hover:shadow-sm transition-shadow">
          <div class="flex flex-wrap items-center justify-between gap-2 mb-2">
            <div class="text-sm text-amber-600 font-semibold">
              ★ <span th:text="${#numbers.formatDecimal(review.reviewStar != null ? review.reviewStar : 0, 1, 1)}">5.0</span>
            </div>
            <div class="text-xs text-gray-500" th:text="${#temporals.format(review.reviewRegdate, 'yyyy-MM-dd')}">2026-04-18</div>
          </div>

          <a class="block text-sm md:text-base font-semibold text-gray-900 hover:text-emerald-700 truncate"
             th:href="@{/reviews/detail/{reviewIdx}(reviewIdx=${review.reviewIdx}, fromProfile=true, memIdx=${profile.memIdx}, from=${from}, auctionId=${auctionId})}"
             th:text="${review.reviewTitle}">리뷰 제목</a>

          <p class="mt-2 text-sm text-gray-600 truncate"
             th:text="${'거래 상품: ' + (review.itemName != null and review.itemName != '' ? review.itemName : review.auctionTitle)}">거래 상품: 예시 상품명</p>
        </article>
      </div>

      <div th:if="${reviews == null or #lists.isEmpty(reviews)}"
           class="rounded-xl border border-dashed border-gray-300 bg-gray-50 px-4 py-10 text-center text-sm text-gray-500">
        아직 등록된 거래 후기가 없습니다.
      </div>
    </section>
  </section>
</th:block>
</body>
</html>
