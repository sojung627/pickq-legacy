<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">
<head>
<meta charset="UTF-8">
<title>개인정보확인/수정 - 마이페이지</title>

<!-- BI 아이콘 -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- 다음 우편번호 -->
<script
	src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<script type="text/javascript">
    // 전화번호 - 010-xxxx-xxxx 형식
    function formatTel(input) {
      let value = input.value.replace(/[^0-9]/g, "");

      if (value.length <= 3) {
        input.value = value;
      } else if (value.length <= 7) {
        input.value = value.substring(0, 3) + "-" + value.substring(3);
      } else {
        input.value = value.substring(0, 3) + "-" +
            value.substring(3, 7) + "-" +
            value.substring(7, 11);
      }
    }

    // 비밀번호 제약조건 + disabled 제어
    document.addEventListener("DOMContentLoaded", function() {

      const form = document.getElementById("memberUpdateForm");
      const inputs = form.querySelectorAll("input");
      const submitBtn = document.querySelector("#submitBtn");

      // 초기값 저장
      const initialValues = {};
      inputs.forEach(input => {
        if (input.name) {
          initialValues[input.name] = input.value;
        }
      });

      submitBtn.disabled = true;

      inputs.forEach(input => {
        input.addEventListener("input", validateAll);
      });

      function validateAll() {
        let isChanged = false;

        // 변경 감지
        inputs.forEach(input => {
          if (!input.name) return;
          if (initialValues[input.name] !== input.value) {
            isChanged = true;
          }
        });

        let pwd = document.querySelector("#newPwd").value.trim();
        let pwdCheck = document.querySelector("#newPwdConfirm").value.trim();
        let msg = document.querySelector("#pwdMatchMsg");

        let pwdReg = /^[A-Za-z0-9]{5,}$/;

        // 비밀번호 입력 안했으면 → 변경만 체크
        if (pwd === "" && pwdCheck === "") {
          msg.textContent = "";
          submitBtn.disabled = !isChanged;
          return;
        }

        // 비밀번호 제약조건
        if (!pwdReg.test(pwd)) {
          msg.style.color = "red";
          msg.textContent = "✘ 영문 + 숫자 5글자 이상으로 입력해주세요.";
          submitBtn.disabled = true;
          return;
        }

        // 비밀번호 일치 확인
        if (pwd === pwdCheck) {
          msg.style.color = "gray";
          msg.textContent = "✔ 비밀번호가 일치하며 사용 가능합니다.";

          // 변경도 있고 비밀번호도 OK일 때만 활성화
          submitBtn.disabled = !isChanged;
        } else {
          msg.style.color = "red";
          msg.textContent = "✘ 비밀번호가 일치하지 않습니다.";
          submitBtn.disabled = true;
          return;
        }

        // 이전 비밀번호와 동일 여부 체크
        if (pwd !== "") {
          fetch("/checkOldPwd", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "newPwd=" + encodeURIComponent(pwd)
          })
              .then(res => res.json())
              .then(isSame => {
                if (isSame) {
                  msg.style.color = "red";
                  msg.textContent = "✘ 기존 비밀번호와 동일합니다.";
                  submitBtn.disabled = true;
                  return;
                }
              });
        }
      }

    });

    // 비밀번호 눈 아이콘 토글
    document.addEventListener("DOMContentLoaded", function () {
      const pwdInput = document.getElementById("newPwd");
      const newPwdConfirm = document.getElementById("newPwdConfirm");
      const togglePwd = document.getElementById("togglePwd");

      if (togglePwd && pwdInput && newPwdConfirm) {
        togglePwd.addEventListener("click", function () {
          if (pwdInput.type === "password") {
            pwdInput.type = "text";
            newPwdConfirm.type = "text";
            this.innerHTML = '<i class="bi bi-eye-slash"></i>';
          } else {
            pwdInput.type = "password";
            newPwdConfirm.type = "password";
            this.innerHTML = '<i class="bi bi-eye"></i>';
          }
        });
      }
    });
  </script>
</head>
<body>
	<div layout:fragment="content">

		<form action="/mypage/info" id="memberUpdateForm"
			name="memberUpdateForm" method="post">

			<div
				class="border border-gray-100 bg-white rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
				<!-- 헤더 -->
				<div class="px-6 py-5 border-b border-gray-100">
					<h2 class="text-lg sm:text-xl font-bold text-[#222222]">개인정보확인/수정</h2>
					<p class="mt-1 text-xs sm:text-sm text-[#767676]">회원 정보를
						업데이트하세요</p>
				</div>

				<!-- 내용 -->
				<div class="px-6 py-6 space-y-5">

					<!-- 아이디 / 회원등급 -->
					<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
						<div class="space-y-1.5">
							<label for="memId" class="text-sm font-medium text-gray-900">아이디</label>
							<input type="text" name="memId" id="memId"
								th:value="${memberVO.memId}" readonly
								class="w-full bg-gray-100 border border-gray-300 rounded-md px-3 h-10 text-sm text-gray-600">
						</div>

						<div class="space-y-1.5">
							<label class="text-sm font-medium text-gray-900">회원등급</label>
							<div class="flex items-center gap-2">
								<span
									class="inline-flex items-center px-2 py-1 rounded-full bg-yellow-500 text-white text-xs font-semibold">
									<span th:text="${gradeName}">골드</span>
								</span> <span class="text-xs sm:text-sm text-gray-500"> <!-- 필요하면 등급 index도 같이 출력 -->
								</span>
							</div>
						</div>
					</div>

					<!-- 이름 -->
					<div class="space-y-1.5">
						<label for="memName" class="text-sm font-medium text-gray-900">이름</label>
						<input type="text" name="memName" id="memName"
							th:value="${memberVO.memName}"
							class="w-full bg-white border border-gray-300 rounded-md px-3 h-10 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
					</div>

					<!-- 이메일 -->
					<div class="space-y-1.5">
						<label for="memEmail" class="text-sm font-medium text-gray-900">이메일</label>
						<input type="text" name="memEmail" id="memEmail"
							th:value="${memberVO.memEmail}"
							class="w-full bg-white border border-gray-300 rounded-md px-3 h-10 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
					</div>

					<!-- 전화번호 -->
					<div class="space-y-1.5">
						<label for="memTel" class="text-sm font-medium text-gray-900">전화번호</label>
						<input type="text" name="memTel" id="memTel"
							th:value="${memberVO.memTel}" maxlength="13"
							oninput="formatTel(this)"
							class="w-full bg-white border border-gray-300 rounded-md px-3 h-10 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
					</div>

					<!-- 생년월일 -->
					<div class="space-y-1.5">
						<label for="memBday" class="text-sm font-medium text-gray-900">생년월일</label>
						<input type="date" name="memBday" id="memBday"
							th:value="${memberVO.memBday}"
							class="w-full bg-white border border-gray-300 rounded-md px-3 h-10 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
					</div>

        <!-- 비밀번호 변경 -->
        <div class="space-y-2" th:if="${memberVO.memLoginType != 'NAVER'}">
          <label class="text-sm font-medium text-gray-900">새 비밀번호</label>
          <div class="relative">
            <input type="password"
                   name="newPwd"
                   id="newPwd"
                   placeholder="🔒 변경할 비밀번호를 입력해주세요"
                   class="w-full bg-white border border-gray-300 rounded-md px-3 pr-9 h-10 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
            <span id="togglePwd"
                  class="absolute inset-y-0 right-2 flex items-center text-gray-500 cursor-pointer">
              <i class="bi bi-eye"></i>
            </span>
          </div>

						<label for="newPwdConfirm"
							class="text-sm font-medium text-gray-900 mt-2">비밀번호 확인</label> <input
							type="password" id="newPwdConfirm"
							placeholder="🔒 변경할 비밀번호를 확인해주세요"
							class="w-full bg-white border border-gray-300 rounded-md px-3 h-10 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">

						<span id="pwdMatchMsg" class="text-[11px]"></span>
					</div>

					<!-- 버튼 -->
					<div class="pt-1">
						<button type="submit" id="submitBtn" disabled
							class="inline-flex items-center px-4 py-2.5 bg-[#7CBD00] text-white rounded-md text-sm font-semibold hover:bg-[#6BAD00] disabled:bg-gray-300 disabled:cursor-not-allowed">
							정보 업데이트</button>
					</div>

				</div>
			</div>

		</form>

	</div>
</body>
</html>
