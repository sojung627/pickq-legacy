<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title>로그인 - PickQ</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script
	src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js"
	charset="utf-8"></script>
</head>
<body>
	<th:block layout:fragment="content">

		<script type="text/javascript">
			// 필수 항목 체크
			function checkValid() {
				let memId = document.querySelector("#memId").value.trim();
				let memPwd = document.querySelector("#memPwd").value.trim();
				let btn = document.querySelector("input[name='loginBtn']");

				let isValid = memId !== "" && memPwd !== "";

				btn.disabled = !isValid;

				if (!isValid) {
					btn.style.opacity = "0.5";
					btn.style.cursor = "not-allowed";
				} else {
					btn.style.opacity = "1";
					btn.style.cursor = "pointer";
				}
			}

			// 아이디 저장용
			window.addEventListener("load", function() {
				const savedId = localStorage.getItem("savedId");
				if (savedId) {
					document.getElementById("memId").value = savedId;
					document.getElementById("saveId").checked = true;
					checkValid();
				}
			});

			function saveIdCheck() {
				const memId = document.getElementById("memId").value;
				const saveId = document.getElementById("saveId").checked;

				if (saveId) {
					localStorage.setItem("savedId", memId);
				} else {
					localStorage.removeItem("savedId");
				}
			}
		</script>

		<div
			class="min-h-[calc(100vh-200px)] flex items-center justify-center px-4 py-10 bg-white">
			<div class="w-full max-w-md">

				<!-- 상단 헤더 -->
				<div class="text-center mb-6">
					<div class="flex justify-center mb-3">
						<div
							class="flex h-16 w-16 items-center justify-center rounded-2xl bg-[#7CBD00]">
							<i class="bi bi-lightning-fill text-white fs-2"></i>
						</div>
					</div>
					<h1 class="text-3xl font-bold text-[#222222] mb-1">로그인</h1>
					<p class="text-sm text-[#767676]">PickQ에 오신 것을 환영합니다</p>
				</div>

				<!-- 카드 -->
				<div
					class="bg-white border border-gray-100 rounded-2xl shadow-[0_4px_12px_rgba(0,0,0,0.03)]">
					<div class="px-6 pt-5 pb-2 border-b border-gray-100">
						<h2 class="text-base sm:text-lg font-semibold text-[#222222]">계정
							정보 입력</h2>
						<p class="mt-1 text-xs sm:text-sm text-[#767676]">아이디와 비밀번호를
							입력해주세요</p>
					</div>

					<div class="px-6 py-6">
						<form th:action="@{/members/login}" method="post" 
							class="space-y-6">
							
							<!-- 인터셉터 메시지 -->
							<div style="font-weight: bold;" th:if="${loginMsg}">
							    <span th:text="${loginMsg}"></span>
							</div>

							<input type="hidden" name="redirect" th:value="${returnUrl != null ? returnUrl : redirect}">
							
							<!-- 잠금처리 당한 아이디 -->
							<input type="hidden" id="lockedMemId" th:value="${lockedId}">

							<!-- 아이디 -->
							<div class="space-y-1">
								<label for="memId" class="text-sm font-medium text-[#222222]">아이디</label>
								<div class="relative">
									<span
										class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[11px]"></span>
									<input
										class="w-full border border-gray-200 rounded-lg px-3 py-2 pl-10 text-sm text-[#222222] placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#7CBD00]"
										id="memId" name="memId" placeholder="your ID"
										oninput="checkValid()">
								</div>
								<label
									class="flex items-center gap-2 mt-1 text-xs text-[#767676] cursor-pointer">
									<input type="checkbox" id="saveId"
									class="rounded border-gray-300"> <span>아이디 저장</span>
								</label>
							</div>

							<!-- 비밀번호 -->
							<div class="space-y-1">
								<label for="memPwd" class="text-sm font-medium text-[#222222]">비밀번호</label>
								<div class="relative">
									<span
										class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[11px]"></span>
									<input
										class="w-full border border-gray-200 rounded-lg px-3 py-2 pl-10 pr-10 text-sm text-[#222222] placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#7CBD00]"
										id="memPwd" name="memPwd" type="password"
										placeholder="••••••••" oninput="checkValid()"> <span
										id="togglePwd"
										class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer text-sm">
										<i class="bi bi-eye"></i>
									</span>
								</div>
							</div>

							<!-- 에러 메시지 -->
							<div th:if="${error}" class="text-xs text-red-500">
								<span th:text="${error}">아이디나 비밀번호가 틀렸습니다</span>
							</div>
							
							<!-- 실시간 카운트다운 표시 -->
							<div id="lockTimer" style="color: gray; font-size: 12px; margin-top: 5px;"></div>

							<!-- 로그인 버튼 -->
							<div class="mt-5 flex justify-center">
								<input type="submit" name="loginBtn" value="로그인"
									onclick="saveIdCheck()"
									class="w-full bg-[#7CBD00] text-white font-semibold py-2.5 rounded-lg text-sm hover:bg-[#6BAD00] transition-colors"
									disabled>
							</div>

							<!-- 구분선 -->
							<div class="relative my-4">
								<div class="absolute inset-0 flex items-center">
									<div class="w-full border-t border-gray-200"></div>
								</div>
								<div class="relative flex justify-center text-xs">
									<span class="px-2 bg-white text-gray-500">또는</span>
								</div>
							</div>

							<!-- 네이버 로그인 -->
							<div class="mb-5">
								<p class="text-xs text-gray-500 mb-2 text-center">네이버 아이디로
									간편 로그인</p>
								<div class="flex justify-center">
									<div id="naverIdLogin" class="w-full max-w-[200px]"></div>
								</div>
							</div>

							<!-- 회원가입 / 비밀번호 찾기 -->
							<div class="space-y-1 text-center text-sm text-gray-600">
								<div>
									아직 계정이 없으신가요? <a th:href="@{/members/register}"
										class="text-[#7CBD00] hover:underline font-semibold"> 회원가입
									</a>
								</div>
								<div>
									비밀번호를 잊으셨나요? <a th:href="@{/members/pwdFind}"
										class="text-[#7CBD00] hover:underline font-semibold"> 비밀번호
										찾기 </a>
								</div>
							</div>

						</form>
						
						<hr>
						
						<!-- 네이버 버튼 -->
						<div id="naverIdLogin"></div> 
						
					</div>
				</div>

			</div>
		</div>
		

			<script type="text/javascript">
				// SDK 초기화 및 버튼 생성
			    var naverLogin = new naver.LoginWithNaverId({
			        clientId: "2Rk518jWd9bxOQoKuUnD", // 발급받은 Client ID
			        callbackUrl: "https://pickq-legacy-production.up.railway.app/members/naverCallback",
			        isPopup: false, // 팝업 방식으로 진행할지 여부
			        loginButton: { color: "green", type: 3, height: 60 } // 버튼 스타일 설정
			    });
			    naverLogin.init();

				
				// 새로고침 x / 실시간 o 
				document.addEventListener("DOMContentLoaded", function () {
				    const errorText = /*[[${error != null ? error : ''}]]*/ "";
				    const timerDiv = document.getElementById("lockTimer");
				    const loginBtn = document.querySelector("input[name='loginBtn']");
				    const lockedMemId = document.getElementById("lockedMemId")?.value || "";
				
				    if (lockedMemId && timerDiv) {
				
				        function updateTimer() {
				            fetch('/members/getRemainingTime?memId=' + encodeURIComponent(lockedMemId))
				                .then(response => response.json())
				                .then(data => {
				                    if (data.remainingSeconds > 0) {
				                        timerDiv.innerHTML =
				                            `⏳ 로그인 제한 중 (${data.remainingSeconds}초 남음)`;
				                        if (loginBtn) loginBtn.disabled = true;
				                    } else {
				                        timerDiv.innerHTML = "다시 로그인을 시도해주세요";
				                        if (loginBtn) loginBtn.disabled = false;
				                        if (interval) clearInterval(interval);
				                    }
				                })
				                .catch(error => console.error("Timer error:", error));
				        }
				
				        updateTimer();
				        const interval = setInterval(updateTimer, 1000);
				    }

				 	// 비번 보기 기능
					const pwdInput = document.getElementById("memPwd");
			        const togglePwd = document.getElementById("togglePwd");
			
			        if (togglePwd && pwdInput) {
			            togglePwd.addEventListener("click", function () {
			                if (pwdInput.type === "password") {
			                    pwdInput.type = "text";
			                    this.innerHTML = '<i class="bi bi-eye-slash"></i>';
			                } else {
			                    pwdInput.type = "password";
			                    this.innerHTML = '<i class="bi bi-eye"></i>';
			                }
			            });
			        }
				    
				});
			</script>

	</th:block>
</body>
</html>
