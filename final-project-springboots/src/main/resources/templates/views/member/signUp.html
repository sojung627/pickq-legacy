<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title>회원가입 - PickQ</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script
	src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js"
	charset="utf-8"></script>

</head>
<body>
	<th:block layout:fragment="content">

	<script type="text/javascript">
    let isIdDuplicate = true;

    // 전화번호 - 010-xxxx-xxxx 형식
    function formatTel(input) {
      let value = input.value.replace(/[^0-9]/g, "");

      if (value.length <= 3) {
        input.value = value;
      } else if (value.length <= 7) {
        input.value = value.substring(0, 3) + "-" + value.substring(3);
      } else {
        input.value = value.substring(0, 3) + "-" +
          value.substring(3, 7) + "-" +
          value.substring(7, 11);
      }
      checkValid();
    }

    // 아이디 중복 체크
    function idCheck() {
      let memId = document.querySelector("#memId").value.trim();
      let memIdMsg = document.querySelector("#memIdMsg");

      let idReg = /^[A-Za-z0-9]{5,}$/;
      if (!idReg.test(memId)) {
        memIdMsg.style.color = "red";
        memIdMsg.textContent = "✘ 영문 + 숫자 5글자 이상으로 입력해주세요.";
        isIdDuplicate = true;
        checkValid();
        return;
      }

      fetch("/members/check_id?memId=" + encodeURIComponent(memId))
        .then(r => {
          if (!r.ok) {
            throw new Error("HTTP " + r.status);
          }
          return r.text();
        })
        .then(data => {
          let result = data.trim();

          if (result === "ok") {
            memIdMsg.style.color = "gray";
            memIdMsg.textContent = "✔ 사용 가능한 아이디입니다.";
            isIdDuplicate = false;
          } else {
            memIdMsg.style.color = "red";
            memIdMsg.textContent = "✘ 이미 사용 중인 아이디입니다.";
            isIdDuplicate = true;
          }

          checkValid();
        })
        .catch(err => {
          console.log("에러 발생:", err);
          memIdMsg.style.color = "red";
          memIdMsg.textContent = "✘ 중복 확인 중 오류가 발생했습니다.";
          isIdDuplicate = true;
          checkValid();
        });
    }

    // 비밀번호 검사
    function pwdCheck() {
      let pwd = document.querySelector("#memPwd").value.trim();
      let pwdCheckValue = document.querySelector("#memPwdCheck").value.trim();
      let msg = document.querySelector("#memPwdMsg");

      let pwdReg = /^[A-Za-z0-9]{5,}$/;

      if (pwd === "" && pwdCheckValue === "") {
        msg.textContent = "";
        checkValid();
        return false;
      }

      if (!pwdReg.test(pwd)) {
        msg.style.color = "red";
        msg.textContent = "✘ 영문 + 숫자 5글자 이상으로 입력해주세요.";
        checkValid();
        return false;
      }

      if (pwd === pwdCheckValue) {
        msg.style.color = "gray";
        msg.textContent = "✔ 사용 가능한 비밀번호입니다.";
        checkValid();
        return true;
      } else {
        msg.style.color = "red";
        msg.textContent = "✘ 비밀번호가 일치하지 않습니다.";
        checkValid();
        return false;
      }
    }

    // 내부 판정용
    function pwdCheckSilent(pwd, pwdCheckValue) {
      let pwdReg = /^[A-Za-z0-9]{5,}$/;
      return pwdReg.test(pwd) && pwd === pwdCheckValue;
    }

    // 최종 유효성 검사
    function checkValid() {
      let memId = document.querySelector("#memId").value.trim();
      let memPwd = document.querySelector("#memPwd").value.trim();
      let memPwdCheck = document.querySelector("#memPwdCheck").value.trim();
      let memName = document.querySelector("#memName").value.trim();
      let memTel = document.querySelector("#memTel").value.trim();
      let memEmail = document.querySelector("#memEmail").value.trim();
      let emailDomain = document.querySelector("#emailDomain").value.trim();
      let agree1 = document.querySelector("input[name='agree']").checked;

      let btn = document.querySelector("input[name='signUpBtn']");
      let isPwdOk = pwdCheckSilent(memPwd, memPwdCheck);

      let isValid =
        memId !== "" &&
        memPwd !== "" &&
        memPwdCheck !== "" &&
        memName !== "" &&
        memTel !== "" &&
        memEmail !== "" &&
        emailDomain !== "" &&
        agree1 === true &&
        isIdDuplicate === false &&
        isPwdOk === true;

      btn.disabled = !isValid;

      if (!isValid) {
        btn.style.opacity = "0.5";
        btn.style.cursor = "not-allowed";
      } else {
        btn.style.opacity = "1";
        btn.style.cursor = "pointer";
      }
    }

    // 이메일 자동 입력(도메인)
    $(function () {
      $("#selectDomain").on("change", function () {
        let str = $(this).val();

        if (str === "custom") {
          $("#emailDomain").val("");
          $("#emailDomain").prop("readonly", false);
        } else if (str === "naver") {
          $("#emailDomain").val("@naver.com");
          $("#emailDomain").prop("readonly", true);
        } else if (str === "google") {
          $("#emailDomain").val("@gmail.com");
          $("#emailDomain").prop("readonly", true);
        }
      });
    });

    // Naver SDK 초기화 & 비번 토글
    document.addEventListener("DOMContentLoaded", function () {
      var naverLogin = new naver.LoginWithNaverId({
        clientId: "2Rk518jWd9bxOQoKuUnD",
        callbackUrl: "https://pickq-legacy-production.up.railway.app/members/naverCallback",
        isPopup: false,
        loginButton: { color: "green", type: 3, height: 60 }
      });
      naverLogin.init();

      const pwdInput = document.getElementById("memPwd");
      const pwdCheckInput = document.getElementById("memPwdCheck");
      const togglePwd = document.getElementById("togglePwd");

      if (togglePwd && pwdInput) {
        togglePwd.addEventListener("click", function () {
          if (pwdInput.type === "password") {
            pwdInput.type = "text";
            pwdCheckInput.type = "text";
            this.innerHTML = '<i class="bi bi-eye-slash"></i>';
          } else {
            pwdInput.type = "password";
            pwdCheckInput.type = "password";
            this.innerHTML = '<i class="bi bi-eye"></i>';
          }
        });
      }
    });
  </script>

		<div
			class="min-h-[calc(100vh-200px)] flex items-center justify-center px-4 py-10 bg-white">
			<div class="w-full max-w-2xl">

				<!-- 상단 헤더 -->
				<div class="text-center mb-6">
					<div class="flex justify-center mb-3">
						<div
							class="flex h-16 w-16 items-center justify-center rounded-2xl bg-[#7CBD00]">
							<i class="bi bi-lightning-fill text-white fs-2"></i>
						</div>
					</div>
					<h1 class="text-3xl font-bold text-[#222222] mb-1">회원가입</h1>
					<p class="text-sm text-[#767676]">스포츠 용품 역경매의 새로운 경험을 시작하세요</p>
				</div>

				<!-- 카드 -->
				<div
					class="bg-white border border-gray-100 rounded-2xl shadow-[0_4px_12px_rgba(0,0,0,0.03)]">
					<div class="px-6 pt-5 pb-2 border-b border-gray-100">
						<h2 class="text-base sm:text-lg font-semibold text-[#222222]">회원
							정보 입력</h2>
						<p class="mt-1 text-xs sm:text-sm text-[#767676]">모든 항목을 정확히
							입력해주세요</p>
					</div>

					<div class="px-6 py-5">
						<form class="signUp" th:action="@{/members/register}"
							method="post" id="signUpForm">

							<!-- 임시 지정 -->
							<input type="hidden" name="memIp" value="127.0.0.1"> <input
								type="hidden" name="memRoleIdx" value="1"> <input
								type="hidden" name="memGradeIdx" value="1">

							<!-- 이름 + 전화번호 -->
							<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
								<div>
									<label for="memName"
										class="block text-sm font-medium text-[#222222] mb-1">이름</label>
									<div class="relative">
										<span
											class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-[#a7a7a7]">👤</span>
										<input type="text"
											class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm text-[#222222] placeholder:text-[#a7a7a7] focus:outline-none focus:ring-2 focus:ring-[#7CBD00]"
											name="memName" id="memName" placeholder="홍길동"
											oninput="checkValid()">
									</div>
								</div>

								<div>
									<label for="memTel"
										class="block text-sm font-medium text-[#222222] mb-1">전화번호</label>
									<div class="relative">
										<span
											class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-[#a7a7a7]">📞</span>
										<input type="text"
											class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm text-[#222222] placeholder:text-[#a7a7a7] focus:outline-none focus:ring-2 focus:ring-[#7CBD00]"
											name="memTel" id="memTel" placeholder="010-1234-5678"
											maxlength="13" oninput="formatTel(this)">
									</div>
								</div>
							</div>

							<!-- 이메일 -->
							<div class="mb-4">
								<label for="memEmail"
									class="block text-sm font-medium text-[#222222] mb-1">이메일</label>
								<div class="grid grid-cols-[2fr,2fr,1.5fr] gap-2">
									<input type="text"
										class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-[#222222] placeholder:text-[#a7a7a7] focus:outline-none focus:ring-2 focus:ring-[#7CBD00]"
										name="memEmail" id="memEmail" placeholder="yourEmail"
										oninput="checkValid()"> <input type="text"
										class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-[#222222] placeholder:text-[#a7a7a7] focus:outline-none focus:ring-2 focus:ring-[#7CBD00]"
										name="emailDomain" id="emailDomain" placeholder="@email.com"
										oninput="checkValid()"> <select id="selectDomain"
										class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-[#222222] bg-white focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
										<option value="custom">직접입력</option>
										<option value="naver">네이버</option>
										<option value="google">구글</option>
									</select>
								</div>
							</div>

							<!-- 아이디 -->
							<div class="mb-4">
								<label for="memId"
									class="block text-sm font-medium text-[#222222] mb-1">아이디</label>
								<div class="grid grid-cols-[2fr,1fr] gap-2 items-start">
									<input type="text"
										class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-[#222222] placeholder:text-[#a7a7a7] focus:outline-none focus:ring-2 focus:ring-[#7CBD00]"
										name="memId" id="memId" placeholder="your ID"
										oninput="checkValid()">
									<button type="button"
										class="w-full px-3 py-2 rounded-lg bg-amber-400 text-sm font-semibold text-white hover:bg-amber-500"
										onclick="idCheck()">중복확인</button>
								</div>

								<span id="memIdMsg" class="block text-[11px] text-gray-500 mt-1"></span>
								<span class="block text-[11px] text-gray-400 mt-1">✓ 알파벳
									+ 숫자로만 조합해주세요 (5글자 이상)</span>
							</div>

							<!-- 비밀번호 -->
							<div class="mb-4">
								<label for="memPwd"
									class="block text-sm font-medium text-[#222222] mb-1">비밀번호</label>
								<div class="relative">
									<span
										class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-[#a7a7a7]">
										<i class="bi bi-lock"></i>
									</span> <input type="password"
										class="w-full pl-9 pr-10 py-2 border border-gray-200 rounded-lg text-sm text-[#222222] placeholder:text-[#a7a7a7] focus:outline-none focus:ring-2 focus:ring-[#7CBD00]"
										name="memPwd" id="memPwd" placeholder="••••••••"
										oninput="pwdCheck()"> <span id="togglePwd"
										class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer text-sm">
										<i class="bi bi-eye"></i>
									</span>
								</div>
								<span id="memPwdMsg"
									class="block text-[11px] text-gray-500 mt-1"></span> <span
									class="block text-[11px] text-gray-400 mt-1"> ✓ 알파벳 +
									숫자로만 조합해주세요 (5글자 이상) </span>
							</div>

							<!-- 비밀번호 확인 -->
							<div class="mb-4">
								<label for="memPwdCheck"
									class="block text-sm font-medium text-[#222222] mb-1">비밀번호
									확인</label> <input type="password"
									class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-[#222222] placeholder:text-[#a7a7a7] focus:outline-none focus:ring-2 focus:ring-[#7CBD00]"
									name="memPwdCheck" id="memPwdCheck" placeholder="••••••••"
									oninput="pwdCheck()">
							</div>

							<!-- 약관 동의 -->
							<div class="mb-5 pt-3 border-t border-gray-100">
								<label class="flex items-start gap-3 cursor-pointer"> <input
									type="checkbox" name="agree"
									class="mt-[3px] rounded border-gray-300"
									onchange="checkValid()"> <span
									class="text-xs sm:text-sm text-[#767676]"> <span
										class="font-semibold text-[#222222]">이용약관</span> 및 <span
										class="font-semibold text-[#222222]"> 개인정보 처리방침</span>에 동의합니다.
										<span class="block text-[11px] text-gray-400 mt-1">
											회원가입을 위해서는 약관 동의가 필수입니다. </span>
								</span>
								</label>
							</div>

							<!-- 에러 메시지 -->
							<div class="mb-3" th:if="${errorMessage}">
								<p class="text-sm text-red-500" th:text="${errorMessage}"></p>
							</div>

							<!-- 가입 버튼 -->
							<div class="mb-3">
								<input type="submit" name="signUpBtn" value="✔️ 회원가입 완료"
									class="w-full px-4 py-2 rounded-lg bg-[#7CBD00] text-white text-sm font-semibold hover:bg-[#6BAD00] transition-opacity"
									disabled>
							</div>

							<!-- 네이버 로그인 -->
							<div class="mt-4">
								<p class="text-xs text-gray-500 mb-2 text-center">
									네이버 아이디가 있으신가요?
								</p>
								<div class="flex justify-center">
									<div id="naverIdLogin" class="w-full max-w-[250px]"></div>
								</div>
							</div>

						</form>
					</div>
				</div>

			</div>
		</div>

	</th:block>
</body>
</html>
