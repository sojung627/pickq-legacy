<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title>비밀번호 찾기 - PickQ</title>
</head>
<body>
	<th:block layout:fragment="content">
		<script type="text/javascript">
			let isAuthOk = false;
			let isSamePwd = false;

			function formatTel(input) {
				let value = input.value.replace(/[^0-9]/g, "");

				if (value.length <= 3) {
					input.value = value;
				} else if (value.length <= 7) {
					input.value = value.substring(0, 3) + "-" + value.substring(3);
				} else {
					input.value = value.substring(0, 3) + "-"
							+ value.substring(3, 7) + "-" + value.substring(7, 11);
				}
			}

			function checkAuthCode() {
				let userCode = $("#userInputCode").val();

				$.ajax({
					url : "/auth/verifyCode",
					type : "POST",
					data : {
						"userCode" : userCode
					},
					success : function(res) {
						if (res === "success") {
							isAuthOk = true;
							$("#authMsg").text("인증 되었습니다").css({
								"color" : "#6b7280",
								"fontSize" : "12px"
							});
						} else {
							isAuthOk = false;
							$("#authMsg").text("인증번호가 틀렸습니다").css({
								"color" : "#ef4444",
								"fontSize" : "12px"
							});
						}
						checkAll();
					},
					error : function() {
						alert("죄송합니다 \n예기치 못한 오류가 발생하여 잠시 후 다시 시도해 주세요");
					}
				});
			}

			$(document).ready(function() {
				$("#newPwd, #newPwdConfirm").on("keyup", function() {
					checkAll();
				});

				$("#newPwd").on("blur", function() {
					let newPwd = $(this).val();

					$.ajax({
						url : "/auth/checkSamePwd",
						type : "POST",
						data : {
							"newPwd" : newPwd
						},
						success : function(res) {
							if (res === "same") {
								isSamePwd = true;
								$("#pwdMatchMsg").text("이전 비밀번호입니다").css("color",
										"#ef4444");
							} else {
								isSamePwd = false;
							}
							checkAll();
						}
					});
				});
			});

			function checkAll() {
				let pwd1 = $("#newPwd").val();
				let pwd2 = $("#newPwdConfirm").val();
				let submitBtn = $("#submitBtn");

				let pwdReg = /^[A-Za-z0-9]{5,}$/;
				let isPwdValid = false;
				let isMatch = false;

				if (!pwdReg.test(pwd1)) {
					$("#pwdMsg").text("✘ 영문 + 숫자 5글자 이상").css("color", "#ef4444");
					isPwdValid = false;
				} else {
					$("#pwdMsg").text("✔ 사용 가능한 비밀번호").css("color", "#6b7280");
					isPwdValid = true;
				}

				if (pwd2 === "") {
					$("#pwdConfirmMsg").text("").css("color", "#6b7280");
					isMatch = false;
				} else if (pwd1 === pwd2) {
					if (isSamePwd) {
						$("#pwdConfirmMsg").text("✘ 이전 비밀번호와 동일합니다").css("color",
								"#ef4444");
						isMatch = false;
					} else {
						$("#pwdConfirmMsg").text("✔ 비밀번호 일치").css("color", "#6b7280");
						isMatch = true;
					}
				} else {
					$("#pwdConfirmMsg").text("✘ 비밀번호 불일치").css("color", "#ef4444");
					isMatch = false;
				}

				if (isPwdValid && isMatch && isAuthOk) {
					submitBtn.prop("disabled", false);
				} else {
					submitBtn.prop("disabled", true);
				}
			}
		</script>

		<div
			class="min-h-[calc(100vh-200px)] bg-gradient-to-b from-[#f6ffe8] to-white px-4 py-10 sm:py-14">
			<div class="mx-auto w-full max-w-2xl">
				<div class="mb-6 text-center">
					<div class="inline-flex items-center gap-2 rounded-full border border-[#d6e9a8] bg-white px-4 py-1.5 text-xs font-semibold text-[#5f7f00]">
						<i class="bi bi-shield-lock"></i>
						계정 보안
					</div>
					<h1 class="mt-4 text-2xl sm:text-3xl font-bold text-[#222222]">비밀번호 찾기</h1>
					<p class="mt-2 text-sm text-[#767676]">아이디와 전화번호 인증 후 새로운 비밀번호로 변경하세요.</p>
				</div>

				<div class="rounded-2xl border border-[#eef3df] bg-white p-5 sm:p-7 shadow-[0_8px_24px_rgba(124,189,0,0.08)]">
					<div class="grid gap-6 md:grid-cols-2">
						<div class="rounded-xl border border-gray-100 bg-[#fafcf6] p-4 sm:p-5">
							<h2 class="text-base font-semibold text-[#222222]">1. 본인 확인</h2>
							<p class="mt-1 text-xs text-[#767676]">입력한 번호로 인증번호를 발송합니다.</p>

							<form class="pwdFind mt-4 space-y-3" action="/members/pwdFind" method="post">
								<div>
									<label class="block text-xs font-medium text-[#444444] mb-1">아이디</label>
									<input type="text" name="memId" placeholder="your ID" required
										class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
									<div class="mt-1 text-xs text-[#767676]" th:text="${idMsg}"></div>
								</div>

								<div>
									<label class="block text-xs font-medium text-[#444444] mb-1">전화번호</label>
									<input type="text" name="memTel" placeholder="010-1234-5678" maxlength="13"
										oninput="formatTel(this)" required
										class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
									<div class="mt-1 text-xs text-[#767676]" th:text="${telMsg}"></div>
								</div>

								<button type="submit"
									class="w-full rounded-lg bg-[#7CBD00] py-2.5 text-sm font-semibold text-white transition-colors hover:bg-[#6BAD00]">
									인증번호 받기
								</button>
								<div class="text-xs text-[#5f7f00]" th:text="${verifyMsg}"></div>
							</form>
						</div>

						<div class="rounded-xl border border-gray-100 bg-white p-4 sm:p-5">
							<h2 class="text-base font-semibold text-[#222222]">2. 비밀번호 재설정</h2>
							<p class="mt-1 text-xs text-[#767676]">인증 후 새 비밀번호를 입력하세요.</p>

							<form class="newPwdFind mt-4 space-y-3" action="/members/newPwdFind" method="post">
								<div>
									<label class="block text-xs font-medium text-[#444444] mb-1">인증번호</label>
									<div class="flex gap-2">
										<input type="text" id="userInputCode" name="authCode" placeholder="인증번호를 입력하세요"
											class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
										<button type="button" onclick="checkAuthCode()"
											class="shrink-0 rounded-lg border border-[#cfe598] px-3 py-2 text-xs font-semibold text-[#5f7f00] hover:bg-[#f6ffe8]">
											확인
										</button>
									</div>
									<span id="authMsg" class="mt-1 block text-xs"></span>
								</div>

								<div>
									<label class="block text-xs font-medium text-[#444444] mb-1">새 비밀번호</label>
									<p class="mb-1 text-[11px] text-[#767676]">알파벳 + 숫자 조합, 5글자 이상</p>
									<div class="relative">
										<input type="password" id="newPwd" name="newPassword" placeholder="새 비밀번호를 입력하세요"
											class="w-full rounded-lg border border-gray-200 px-3 py-2 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
										<span id="togglePwd"
											class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-500">
											<i class="bi bi-eye"></i>
										</span>
									</div>
									<span id="pwdMsg" class="mt-1 block text-xs"></span>
								</div>

								<div>
									<label class="block text-xs font-medium text-[#444444] mb-1">비밀번호 확인</label>
									<input type="password" id="newPwdConfirm" placeholder="다시 한번 입력하세요"
										class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
									<span id="pwdConfirmMsg" class="mt-1 block text-xs"></span>
								</div>

								<button type="submit" id="submitBtn" disabled
									class="w-full rounded-lg bg-[#7CBD00] py-2.5 text-sm font-semibold text-white transition-colors enabled:hover:bg-[#6BAD00] disabled:cursor-not-allowed disabled:opacity-50">
									변경
								</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script type="text/javascript">
			document.addEventListener("DOMContentLoaded", function() {
				const pwdInput = document.getElementById("newPwd");
				const newPwdConfirm = document.getElementById("newPwdConfirm");
				const togglePwd = document.getElementById("togglePwd");

				if (togglePwd && pwdInput) {
					togglePwd.addEventListener("click", function() {
						if (pwdInput.type === "password") {
							pwdInput.type = "text";
							newPwdConfirm.type = "text";
							this.innerHTML = '<i class="bi bi-eye-slash"></i>';
						} else {
							pwdInput.type = "password";
							newPwdConfirm.type = "password";
							this.innerHTML = '<i class="bi bi-eye"></i>';
						}
					});
				}
			});
		</script>
	</th:block>
</body>
</html>
