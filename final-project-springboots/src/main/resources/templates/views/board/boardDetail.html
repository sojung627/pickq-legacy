<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title th:text="${board.boardTitle} + ' - PickQ'">게시글 상세</title>
</head>
<body>
	<th:block layout:fragment="content">

		<div class="min-h-screen bg-white py-8">
			<div class="mx-auto max-w-4xl px-4 sm:px-6">

				<!-- Back Button -->
				<div class="mb-6">
					<a th:href="${backUrl}"
						class="inline-flex items-center text-xs sm:text-sm px-3 py-1.5 rounded-full
                  text-[#767676] hover:text-[#222222] hover:bg-gray-50 border border-transparent transition-colors">
						<i class="bi bi-arrow-left-short me-1" style="font-size: 1rem;"></i>
						목록으로
					</a>
				</div>

				<!-- Post Card -->
				<div
					class="bg-white border border-gray-100 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.03)] mb-6">
					<div class="p-6 sm:p-8">

						<!-- Header -->
						<div class="mb-6 pb-6 border-b border-gray-100">
							<!-- 카테고리 -->
							<a th:href="@{/boards/{tc}(tc=${board.boardTypeCode})}"
								class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-medium
                      bg-gray-100 text-[#767676] mb-3">
								<i class="bi bi-collection-fill me-1 text-[12px]"></i> <span
								th:text="${board.boardTypeName}">축구</span>
							</a>

							<!-- 제목 -->
							<h1
								class="text-2xl sm:text-3xl font-bold text-[#222222] leading-snug mb-4"
								th:text="${board.boardTitle}">프로 축구화 구매 추천 부탁드립니다</h1>

							<!-- 메타 정보 -->
							<div
								class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between text-xs sm:text-sm">
								<!-- 작성자 / 시간 -->
								<div class="flex items-center gap-4 text-[#767676]">
									<div class="flex items-center gap-2">
										<i class="bi bi-person-circle text-[14px]"></i> <span
											th:text="${board.memNickname != null} ? ${board.memNickname} : ${board.memId}">
											soccer_lover </span>
									</div>
									<div class="flex items-center gap-1 text-[#999999]">
										<i class="bi bi-clock-history text-[13px]"></i> <span
											th:text="${#temporals.format(board.boardRegdate, 'yyyy-MM-dd HH:mm')}">
											2026-03-24 12:00 </span>
									</div>
								</div>

								<!-- 조회 / 댓글 / 공유 -->
								<div class="flex items-center gap-4 text-[#767676] justify-end">
									<div class="flex items-center gap-1">
										<i class="bi bi-eye text-[13px]"></i> <span
											th:text="${board.boardViewCount}">0</span>
									</div>
									<div class="flex items-center gap-1">
										<i class="bi bi-chat-dots text-[13px]"></i> <span
											th:text="${totalReplies}">0</span>
									</div>
									<button type="button"
										class="flex items-center gap-1 text-[#a7a7a7] hover:text-[#222222] transition-colors"
										onclick="copyPostUrl()">
										<i class="bi bi-share text-[13px]"></i>
									</button>
								</div>
							</div>
						</div>

						<!-- 본문 -->
						<div class="prose max-w-none mb-6">
							<div
								class="board-content text-sm sm:text-base leading-relaxed text-[#222222]"
								th:utext="${board.boardContent}">게시글 내용</div>
						</div>

						<!-- 좋아요 -->
						<div class="pt-6 border-t border-gray-100">
							<form
								th:action="@{/boards/{tc}/{id}/like(tc=${board.boardTypeCode}, id=${board.boardIdx})}"
								method="post" class="inline-block">
								<input type="hidden" name="replyPage" th:value="${replyPage}">
								<input type="hidden" name="sortType" th:value="${sortType}">
 								<input type="hidden" name="from" th:value="${param.from}">
								<input type="hidden" name="page" th:value="${param.page}">
								<button type="submit"
									class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs sm:text-sm font-semibold border
                             transition-colors"
									th:classappend="${session['boardLike_' + board.boardIdx] != null} ?
                        ' bg-[#222222] border-[#222222] text-white hover:bg-[#444444]' :
                        ' border-gray-200 text-[#222222] hover:bg-gray-50'">
									<i class="bi bi-hand-thumbs-up-fill text-[13px]"></i> <span>좋아요</span>
									<span th:text="${board.boardLike}">0</span>
								</button>
							</form>
						</div>
					</div>
				</div>

				<!-- 수정/삭제 (작성자만) -->
				<div class="flex gap-2 mb-6"
					th:if="${session.loginUser != null and (session.loginUser.memIdx == board.memIdx or session.loginUser.memRoleIdx == 2)}">
					<a
						th:href="@{/boards/{tc}/{id}/edit(tc=${board.boardTypeCode}, id=${board.boardIdx})}"
						class="inline-flex items-center gap-1 px-3 py-1.5 rounded-md text-xs sm:text-sm
                  border border-gray-300 text-[#222222] bg-white hover:bg-gray-50">
						<i class="bi bi-pencil-fill text-[12px]"></i> <span>수정</span>
					</a>
					<form
						th:action="@{/boards/{tc}/{id}/delete(tc=${board.boardTypeCode}, id=${board.boardIdx})}"
						method="post">
						<input type="hidden" name="from" th:value="${param.from}">
						<input type="hidden" name="page" th:value="${param.page}">
						<button type="submit" onclick="return confirm('삭제하시겠습니까?')"
							class="inline-flex items-center gap-1 px-3 py-1.5 rounded-md text-xs sm:text-sm
                         border border-red-300 text-red-600 bg-white hover:bg-red-50">
							<i class="bi bi-trash3-fill text-[12px]"></i> <span>삭제</span>
						</button>
					</form>
				</div>

				<!-- 댓글 카드 -->
				<div
					class="bg-white border border-gray-100 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.03)] mb-6">
					<div class="p-6 sm:p-8">

						<!-- 댓글 헤더 + 정렬 -->
						<div
							class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-4">
							<h2 class="text-lg sm:text-xl font-semibold text-[#222222] mb-0">
								댓글 <span class="ml-1 text-[#7CBD00]" th:text="${totalReplies}">0</span>
							</h2>

							<div class="flex items-center gap-2 text-xs sm:text-sm">
								<a
									th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx}, replyPage=1, sortType='oldest')}"
									class="px-3 py-1.5 rounded-md border transition-colors"
									th:classappend="${sortType == 'oldest'} ?
                   ' bg-[#222222] border-[#222222] text-white' :
                   ' border-gray-300 text-[#222222] bg-white hover:bg-gray-50'">
									등록순 </a> <a
									th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx}, replyPage=1, sortType='latest')}"
									class="px-3 py-1.5 rounded-md border transition-colors"
									th:classappend="${sortType == 'latest'} ?
                   ' bg-[#222222] border-[#222222] text-white' :
                   ' border-gray-300 text-[#222222] bg-white hover:bg-gray-50'">
									최신순 </a>
							</div>
						</div>

						<!-- 대댓글 제한 알림 -->
						<th:block th:if="${param.replyLimitExceeded != null}">
							<script>alert('대댓글은 최대 3개까지만 작성할 수 있습니다.');</script>
						</th:block>

						<!-- 댓글 리스트 -->
						<div class="space-y-4">
							<div th:each="r : ${replies}"
								class="border border-gray-100 rounded-lg bg-white px-3 py-3 sm:px-4 sm:py-4">

								<div class="flex items-start gap-2 sm:gap-3">
									<!-- depth 들여쓰기 -->
									<span th:style="'margin-left:' + (${r.replyDepth} * 12) + 'px'">
										<span th:if="${r.replyDepth > 0}" class="text-[#7CBD00] mr-1">↳</span>
									</span>

									<div class="flex-1">
										<!-- 상단: 작성자 / 시간 / 액션 -->
										<div class="mb-2 flex items-start justify-between gap-2">
											<div class="flex items-center gap-2">
												<div
													class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-100">
													<i class="bi bi-person-fill text-[#a7a7a7]"></i>
												</div>
												<div>
													<div class="text-[13px] font-semibold text-[#222222]"
														th:text="${r.memNickname != null} ? ${r.memNickname} : ${r.memId}">
														작성자</div>
													<div class="text-[11px] text-[#a7a7a7]"
														th:text="${#temporals.format(r.replyRegdate, 'MM-dd HH:mm')}">
														03-24 12:00</div>
												</div>
											</div>

											<div class="flex items-center gap-1 sm:gap-2">
												<!-- 댓글 좋아요 -->
												<form
													th:action="@{/boards/{tc}/{id}/replies/{rid}/like(tc=${typeCode}, id=${board.boardIdx}, rid=${r.replyIdx})}"
													method="post" class="m-0">
													<input type="hidden" name="replyPage"
														th:value="${replyPage}"> <input type="hidden"
														name="sortType" th:value="${sortType}">
													<button type="submit"
														class="inline-flex items-center gap-1 px-2 py-1 rounded-md text-[11px] sm:text-xs
                                       border border-gray-300 bg-white text-[#767676] hover:bg-gray-50">
														<i class="bi bi-hand-thumbs-up-fill text-[11px]"></i> <span
															th:text="${r.replyLike}">0</span>
													</button>
												</form>

												<!-- 댓글 수정/삭제 -->
												<div
													th:if="${session.loginUser != null and (session.loginUser.memIdx == r.memIdx or session.loginUser.memRoleIdx == 2)}"
													class="flex items-center gap-1">
													<button type="button"
														class="inline-flex items-center px-2 py-1 rounded-md text-[11px] sm:text-xs
                                       border border-gray-300 bg-white text-[#767676] hover:bg-gray-50"
														th:onclick="'toggleEditForm(' + ${r.replyIdx} + ')'">
														✏️</button>
													<form
														th:action="@{/boards/{tc}/replies/{rid}/delete(tc=${typeCode}, rid=${r.replyIdx})}"
														method="post" class="m-0">
														<input type="hidden" name="boardIdx"
															th:value="${board.boardIdx}">
														<button type="submit"
															onclick="return confirm('삭제하시겠습니까?')"
															class="inline-flex items-center px-2 py-1 rounded-md text-[11px] sm:text-xs
                                         border border-red-300 bg-white text-red-600 hover:bg-red-50">
															✕</button>
													</form>
												</div>
											</div>
										</div>

										<!-- 댓글 내용 -->
										<div class="reply-content mb-2 text-sm text-[#222222]"
											th:text="${r.replyContent}">댓글 내용</div>

										<!-- 인라인 수정 폼 -->
										<div th:id="'editForm-' + ${r.replyIdx}"
											style="display: none; margin-top: .5rem;">
											<form
												th:action="@{/boards/{tc}/{id}/replies/{rid}/edit(tc=${typeCode}, id=${board.boardIdx}, rid=${r.replyIdx})}"
												method="post" class="mt-2"
												onsubmit="return validateReply(this.querySelector('textarea'))">
												<input type="hidden" name="replyPage"
													th:value="${replyPage}"> <input type="hidden"
													name="sortType" th:value="${sortType}">
												<textarea name="replyContent" rows="2"
													class="form-control form-control-sm mb-1"
													th:text="${r.replyContent}"></textarea>
												<button type="submit" class="btn btn-lime btn-sm">저장</button>
												<button type="button" class="btn btn-ghost btn-sm"
													th:onclick="'toggleEditForm(' + ${r.replyIdx} + ')'">취소</button>
											</form>
										</div>

										<!-- 답글 버튼 -->
										<div
											class="mt-1 flex items-center gap-3 text-[11px] sm:text-xs text-[#767676]">
											<!-- 로그인 O -->
											<th:block th:if="${session.loginUser != null}">
												<span th:if="${r.replyDepth < 3}"
													class="reply-toggle cursor-pointer text-[#7CBD00]"
													th:onclick="'toggleReplyForm(' + ${r.replyIdx} + ')'">
													↩ 답글 </span>
												<span th:if="${r.replyDepth >= 3}"
													class="reply-toggle cursor-pointer"
													onclick="alert('더 이상 답글을 작성할 수 없습니다.')"> ↩ 답글 </span>
											</th:block>

											<!-- 로그인 X -->
											<th:block th:if="${session.loginUser == null}">
												<a th:if="${r.replyDepth < 3}"
													th:href="@{/members/login(redirect='/boards/' + ${typeCode} + '/' + ${board.boardIdx} + '?from=' + ${#strings.defaultString(param.from, '')} + '&page=' + ${#strings.defaultString(param.page, '1')} + '&replyPage=' + ${replyPage} + '&openReply=' + ${r.replyIdx})}"
													class="reply-toggle text-[#7CBD00]"
													style="text-decoration: none;"> ↩ 답글 </a>
												<span th:if="${r.replyDepth >= 3}"
													class="reply-toggle cursor-pointer"
													onclick="alert('더 이상 답글을 작성할 수 없습니다.')"> ↩ 답글 </span>
											</th:block>
										</div>

										<!-- 대댓글 작성 폼 -->
										<div th:id="'replyForm-' + ${r.replyIdx}"
											style="display: none; margin-top: .5rem;">
											<form
												th:action="@{/boards/{tc}/{id}/replies(tc=${typeCode}, id=${board.boardIdx})}"
												method="post" class="mt-1"
												onsubmit="return validateReply(this.querySelector('textarea'))">
												<input type="hidden" name="parentReplyIdx"
													th:value="${r.replyIdx}"> <input type="hidden"
													name="replyPage" th:value="${replyPage}"> <input
													type="hidden" name="sortType" th:value="${sortType}">
												<input type="hidden" name="from" th:value="${param.from}">
												<input type="hidden" name="page" th:value="${param.page}">
												<textarea name="replyContent" rows="2"
													class="form-control form-control-sm mb-1"
													placeholder="답글을 입력하세요"></textarea>
												<button type="submit" class="btn btn-lime btn-sm">등록</button>
												<button type="button" class="btn btn-ghost btn-sm"
													th:onclick="'toggleReplyForm(' + ${r.replyIdx} + ')'">취소</button>
											</form>
										</div>

									</div>
								</div>
							</div>
						</div>

					</div>
				</div>

				<!-- 댓글 작성 폼 (하단) -->
				<div class="mt-6">
					<div th:if="${session.loginUser != null}">
						<form
							th:action="@{/boards/{tc}/{id}/replies(tc=${typeCode}, id=${board.boardIdx})}"
							method="post" class="reply-form"
							onsubmit="return validateReply(this.querySelector('textarea'))">
							<input type="hidden" name="replyPage" th:value="${replyPage}">
							<input type="hidden" name="sortType" th:value="${sortType}">
							<textarea name="replyContent" rows="3" class="form-control mb-2"
								placeholder="댓글을 입력하세요"></textarea>
							<button type="submit"
								class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs sm:text-sm font-semibold
                           bg-[#222222] text-white hover:bg-[#444444]">
								<i class="bi bi-chat-dots me-1 text-[13px]"></i> 댓글 등록
							</button>
						</form>
					</div>
					<div th:if="${session.loginUser == null}"
						class="mt-2 text-[13px] text-[#767676]">
						댓글을 작성하려면 <a
							th:href="@{/members/login(redirect='/boards/' + ${typeCode} + '/' + ${board.boardIdx} + '?from=' + ${#strings.defaultString(param.from, '')} + '&page=' + ${#strings.defaultString(param.page, '1')})}"
							class="text-[#222222] underline-offset-2 hover:underline">
							로그인 </a> 이 필요합니다.
					</div>
				</div>

				<!-- 댓글 페이지네이션 -->
				<div class="mt-6" th:if="${totalReplyPages > 1}">
					<div class="flex items-center justify-center gap-2">
						<a th:if="${replyBlockStart > 1}"
							th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx}, replyPage=${replyBlockStart - 1}, sortType=${sortType})}"
							class="px-3 py-1.5 rounded-md border border-gray-300 text-xs sm:text-sm text-[#767676]
                    bg-white hover:bg-gray-50">
							이전 </a> <a
							th:each="p : ${#numbers.sequence(replyBlockStart, replyBlockEnd)}"
							th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx}, replyPage=${p}, sortType=${sortType})}"
							th:text="${p}"
							class="px-3 py-1.5 rounded-md border text-xs sm:text-sm hover:bg-gray-50"
							th:classappend="${p == replyPage} ?
               ' bg-[#222222] border-[#222222] text-white' :
               ' border-gray-300 text-[#767676]'">
						</a> <a th:if="${replyBlockEnd < totalReplyPages}"
							th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx}, replyPage=${replyBlockEnd + 1}, sortType=${sortType})}"
							class="px-3 py-1.5 rounded-md border border-gray-300 text-xs sm:text-sm text-[#767676]
                    bg-white hover:bg-gray-50">
							다음 </a>
					</div>
				</div>

				<!-- 이전 / 다음 글 -->
				<div class="mt-6 flex justify-between gap-2">
					<a th:href="${prevPostUrl}" th:if="${prevPostUrl != null}"
						class="px-3 py-1.5 rounded-md border border-gray-200 text-xs sm:text-sm text-[#222222]
                  bg-white hover:bg-gray-50">
						← 이전 글 </a> <span th:if="${prevPostUrl == null}"></span> <a
						th:href="${nextPostUrl}" th:if="${nextPostUrl != null}"
						class="ml-auto px-3 py-1.5 rounded-md border border-gray-200 text-xs sm:text-sm text-[#222222]
                  bg-white hover:bg-gray-50">
						다음 글 → </a>
				</div>

			</div>
		</div>

		<script th:src="@{/js/reply.js}"></script>
		<script>
    function copyPostUrl() {
      const url = window.location.href;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url)
          .then(() => alert('URL이 클립보드에 복사되었습니다.'))
          .catch(() => alert('URL 복사에 실패했습니다.'));
      } else {
        const temp = document.createElement('input');
        temp.value = url;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        alert('URL이 클립보드에 복사되었습니다.');
      }
    }
  </script>

	</th:block>
</body>
</html>
