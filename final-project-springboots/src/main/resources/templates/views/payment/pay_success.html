<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">
<head>
  <meta charset="UTF-8">
  <title>결제 승인 중 - PickQ</title>
</head>
<body>
<main layout:fragment="content">
  <div class="mx-auto flex min-h-[70vh] max-w-2xl items-center justify-center px-4 py-10">
    <div class="w-full rounded-2xl border border-gray-100 bg-white px-6 py-10 text-center shadow-[0_4px_12px_rgba(0,0,0,0.03)] sm:px-10">
      <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-full bg-[#F3FAE8] text-[#7CBD00]">
        <div class="h-7 w-7 animate-spin rounded-full border-4 border-[#DDEBC0] border-t-[#7CBD00]"></div>
      </div>
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-[#7CBD00]">Payment</p>
      <h1 class="mt-3 text-2xl font-bold text-[#222222] sm:text-3xl">결제 승인 중입니다</h1>
      <p class="mt-4 text-sm leading-7 text-[#6B7280]">안전한 결제 처리를 위해 잠시만 기다려 주세요. 페이지를 닫지 마세요.</p>
      <div class="mt-8 rounded-2xl bg-[#F9FAFB] px-4 py-4 text-sm text-[#374151]">
        결제 승인 결과를 확인한 뒤 결제 내역으로 이동합니다.
      </div>
    </div>
  </div>

  <script src="https://js.tosspayments.com/v1/payment"></script>
  <script th:src="@{/js/payment.js}"></script>
</main>
</body>
</html>
