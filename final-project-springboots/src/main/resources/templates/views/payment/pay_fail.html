<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">
<head>
  <meta charset="UTF-8">
  <title>결제 실패 - PickQ</title>
</head>
<body>
<main layout:fragment="content">
  <div class="mx-auto flex min-h-[70vh] max-w-2xl items-center justify-center px-4 py-10">
    <div class="w-full rounded-2xl border border-gray-100 bg-white px-6 py-10 text-center shadow-[0_4px_12px_rgba(0,0,0,0.03)] sm:px-10">
      <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-full bg-red-50 text-red-500">
        <i data-feather="alert-circle" class="h-7 w-7"></i>
      </div>
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-red-500">Payment Failed</p>
      <h1 class="mt-3 text-2xl font-bold text-[#222222] sm:text-3xl">결제에 실패하였습니다.</h1>
      <p id="fail-reason" class="mt-4 text-sm leading-7 text-[#6B7280]"
        th:text="${failMessage != null ? '사유: ' + failMessage : '사유를 확인할 수 없습니다.'}">사유를 확인할 수 없습니다.</p>
      <div class="mt-8 rounded-2xl bg-[#F9FAFB] px-4 py-4 text-sm text-[#374151]">
        3초 뒤 주문 내역으로 이동합니다.
      </div>
      <a href="/mypage/orders"
         class="mt-8 inline-flex items-center justify-center rounded-full bg-[#222222] px-6 py-3 text-sm font-semibold text-white transition-colors hover:bg-[#111111]">
        주문 내역으로 돌아가기
      </a>
    </div>
  </div>

  <script src="https://js.tosspayments.com/v1/payment"></script>
  <script th:src="@{/js/payment.js}"></script>
  <script th:inline="javascript">
    (function () {
      const params = new URLSearchParams(window.location.search);
      const message = params.get('message');
      const failReason = document.getElementById('fail-reason');
      if (failReason && message) {
        failReason.textContent = '사유: ' + message;
      }

      window.setTimeout(function () {
        window.location.href = '/mypage/orders';
      }, 3000);
    })();
  </script>
</main>
</body>
</html>
