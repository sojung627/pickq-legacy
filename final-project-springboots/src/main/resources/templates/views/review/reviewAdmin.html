<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">
<head>
<meta charset="UTF-8">
<title>리뷰 관리 - 관리자</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
	<div layout:fragment="content">

		<form class="review" method="get">

			<!-- 활성 리뷰 영역 -->
			<div
				class="border border-gray-200 bg-white rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)] mb-6">
				<div class="px-6 py-5 border-b border-gray-100">
					<h2 class="text-lg sm:text-xl font-bold text-gray-900">모든 유저의
						리뷰 관리</h2>
					<p class="mt-1 text-xs sm:text-sm text-gray-600">현재 노출 중인 리뷰
						목록입니다.</p>
				</div>

				<div class="px-6 py-6 space-y-4">

					<!-- 리스트 있을 때 -->
					<div th:if="${!#lists.isEmpty(activeList)}" class="space-y-3">
						<div th:each="review : ${activeList}"
							class="border border-gray-100 rounded-lg px-4 py-3 hover:border-[#7CBD00] transition-colors">

							<div class="flex justify-between items-start gap-2 mb-1.5">
								<div class="min-w-0">
									<h3 class="text-sm font-semibold text-gray-900"
										th:text="${review.auctionTitle}">거래 제목</h3>
									<p class="text-[11px] text-gray-500 mt-0.5 truncate">
										상품명: <span th:text="${review.itemName}">상품명</span>
									</p>
								</div>
								<div class="text-right text-xs text-yellow-500">
									<span th:with="star=${review.reviewStar}"> <span
										th:each="i : ${#numbers.sequence(1, star)}"> <i
											class="bi bi-star-fill"></i>
									</span> <span th:if="${star < 5}"
										th:each="i : ${#numbers.sequence(1, 5 - star)}"> <i
											class="bi bi-star"></i>
									</span>
									</span>
									<div class="text-[11px] text-gray-400 mt-0.5"
										th:text="${#temporals.format(review.reviewRegdate, 'yyyy-MM-dd HH:mm')}">
									</div>
								</div>
							</div>

							<div class="mt-2 flex gap-2 justify-end">
								<button type="button"
									class="inline-flex items-center px-3 py-1.5 rounded-md border border-gray-300 text-xs sm:text-sm text-gray-700 hover:bg-gray-50"
									th:onclick="|location.href='@{/mypage/reviews/reviewDetail(reviewIdx=${review.reviewIdx})}'|">
									상세보기</button>
								<button type="button"
									th:if="${session.loginUser.memRoleIdx == 2}"
									class="inline-flex items-center px-3 py-1.5 rounded-md border border-red-300 text-xs sm:text-sm text-red-600 hover:bg-red-50"
									th:onclick="|if(confirm('정말 삭제하시겠습니까?')) location.href='@{/reviewDelete(reviewIdx=${review.reviewIdx})}'|">
									임시 삭제</button>
							</div>
						</div>
					</div>

					<!-- 없을 때 -->
					<div th:if="${#lists.isEmpty(activeList)}"
						class="py-10 text-center text-sm text-gray-500">관리할 리뷰가 없습니다
					</div>
				</div>
			</div>

			<!-- 임시 삭제 리뷰 영역 -->
			<div
				class="border border-gray-200 bg-white rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
				<div class="px-6 py-5 border-b border-gray-100">
					<h3 class="text-base sm:text-lg font-bold text-gray-900">임시 삭제
						처리된 유저의 리뷰 관리</h3>
					<p class="mt-1 text-xs sm:text-sm text-gray-600">숨김 처리된 리뷰를
						복구하거나 영구 삭제할 수 있습니다.</p>
				</div>

				<div class="px-6 py-6 space-y-4">

					<!-- 리스트 있을 때 -->
					<div th:if="${!#lists.isEmpty(deletedList)}" class="space-y-3">
						<div th:each="review : ${deletedList}"
							class="border border-gray-100 rounded-lg px-4 py-3 hover:border-[#7CBD00] transition-colors">

							<div class="flex justify-between items-start gap-2 mb-1.5">
								<div class="min-w-0">
									<h4 class="text-sm font-semibold text-gray-900"
										th:text="${review.auctionTitle}">거래 제목</h4>
									<p class="text-[11px] text-gray-500 mt-0.5 truncate">
										상품명: <span th:text="${review.itemName}">상품명</span>
									</p>
								</div>
								<div class="text-right text-xs text-yellow-500">
									<span th:with="star=${review.reviewStar}"> <span
										th:each="i : ${#numbers.sequence(1, star)}"> <i
											class="bi bi-star-fill"></i>
									</span> <span th:if="${star < 5}"
										th:each="i : ${#numbers.sequence(1, 5 - star)}"> <i
											class="bi bi-star"></i>
									</span>
									</span>
									<div class="text-[11px] text-gray-400 mt-0.5"
										th:text="${#temporals.format(review.reviewRegdate, 'yyyy-MM-dd HH:mm')}">
									</div>
								</div>
							</div>

							<div class="mt-2 flex flex-wrap gap-2 justify-end">
								<button type="button"
									th:if="${session.loginUser.memRoleIdx == 2}"
									class="inline-flex items-center px-3 py-1.5 rounded-md border border-gray-300 text-xs sm:text-sm text-gray-700 hover:bg-gray-50"
									th:onclick="|location.href='@{/mypage/reviews/reviewDetail(reviewIdx=${review.reviewIdx})}'|">
									상세보기</button>
								<button type="button"
									th:if="${session.loginUser.memRoleIdx == 2}"
									class="inline-flex items-center px-3 py-1.5 rounded-md border border-amber-300 text-xs sm:text-sm text-amber-700 hover:bg-amber-50"
									th:onclick="|location.href='@{/review/reviewCancel(reviewIdx=${review.reviewIdx})}'|">
									삭제 취소</button>
								<button type="button"
									th:if="${session.loginUser.memRoleIdx == 2}"
									class="inline-flex items-center px-3 py-1.5 rounded-md border border-red-300 text-xs sm:text-sm text-red-600 hover:bg-red-50"
									th:onclick="|if(confirm('⚠️ 정말 영구삭제 하시겠습니까?\n삭제된 리뷰는 되돌릴 수 없습니다')) location.href='@{/review/hardDelete(reviewIdx=${review.reviewIdx})}'|">
									영구 삭제</button>
							</div>
						</div>
					</div>

					<!-- 없을 때 -->
					<div th:if="${#lists.isEmpty(deletedList)}"
						class="py-10 text-center text-sm text-gray-500">임시삭제 된 리뷰가
						없습니다</div>
				</div>
			</div>

		</form>

	</div>
</body>
</html>
