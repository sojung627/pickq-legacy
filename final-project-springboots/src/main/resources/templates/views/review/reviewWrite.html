<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">
<head>
<meta charset="UTF-8">
<title>리뷰 작성하기 - 마이페이지</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
	<div layout:fragment="content">

		<!-- 숨겨진 기본 정보 -->
		<input type="hidden" name="buyer_idx"
			th:value="${session.loginUser.memIdx}"> <input type="hidden"
			name="bidder_idx" th:value="${selectedBidderIdx}"> <input
			type="hidden" name="auction_idx" th:value="${selectedAuctionIdx}"> <input
			type="hidden" name="bid_idx" th:value="${selectedBidIdx}">

		<!-- 전체 래퍼 -->
		<div class="space-y-6">

			<!-- 상단 제목 + 검색 박스 카드 -->
			<div
				class="border border-gray-200 bg-white rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
				<div class="px-6 py-5 border-b border-gray-100">
					<h2 class="text-lg sm:text-xl font-bold text-gray-900">리뷰 작성하기</h2>
					<p class="mt-1 text-xs sm:text-sm text-gray-600">리뷰를 남길 거래를 먼저
						선택해주세요</p>
				</div>

				<div class="px-6 py-5 space-y-4">

					<!-- 검색 폼 -->
					<form action="/mypage/reviews/reviewSearch" method="get"
						class="search-box flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
						<select name="searchType"
							class="w-full sm:w-40 border border-gray-300 rounded-md px-2.5 py-2 text-sm text-gray-900 bg-white focus:outline-none focus:ring-2 focus:ring-[#7CBD00]">
							<option value="">선택하기</option>
							<option value="auctionTitle"
								th:selected="${searchType == 'auctionTitle'}">경매 제목</option>
							<option value="itemName"
								th:selected="${searchType == 'itemName'}">상품명</option>
						</select> <input type="text" name="keyword" placeholder="검색어를 입력하세요"
							th:value="${keyword}"
							class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm text-gray-900 bg-white focus:outline-none focus:ring-2 focus:ring-[#7CBD00]" />

						<!-- 검색 버튼 (JS로 disabled 제어) -->
						<button id="searchBtn" type="submit" disabled
							class="px-4 py-2 rounded-md text-sm font-semibold text-white bg-[#7CBD00] hover:bg-[#6BAD00] disabled:bg-gray-300 disabled:cursor-not-allowed">
							검색</button>
					</form>

					<!-- 검색 결과 안내 문구 -->
					<div
						th:if="${keyword != null and keyword != '' and #lists.isEmpty(reviewList)}"
						class="text-xs sm:text-sm text-gray-500">
						"<span th:text='${keyword}'></span>"(이)과 관련된 거래가 없습니다
					</div>

					<div
						th:if="${keyword != null and keyword != '' and !#lists.isEmpty(reviewList)}"
						class="text-xs sm:text-sm text-gray-700">
						"<span th:text='${keyword}'></span>"(이)과 관련된 거래입니다
					</div>

					<!-- 거래 리스트 -->
					<div
						th:if="${keyword == null or keyword == '' or !#lists.isEmpty(reviewList)}"
						class="mt-2 space-y-3">

						<!-- 리스트가 있을 때 카드 목록 -->
						<div th:if="${#lists.size(reviewList) > 0}" class="space-y-2">
							<div th:each="review : ${reviewList}"
								class="border border-gray-100 rounded-lg px-4 py-3 flex flex-col sm:flex-row sm:items-center justify-between gap-3 hover:border-[#7CBD00] transition-colors">
								<div>
									<h3 class="text-sm font-semibold text-gray-900"
										th:text="${review.auctionTitle}">경매 제목</h3>
									<p class="mt-0.5 text-[11px] text-gray-500">
										상품명: <span th:text="${review.itemName}">상품명</span>
									</p>
								</div>
								<div>
									<button type="button"
										class="px-3 py-1.5 rounded-md border border-gray-300 text-xs sm:text-sm text-gray-700 hover:bg-gray-50"
										th:onclick="selectItem([[${review.bidIdx}]], [[${review.auctionIdx}]], [[${review.bidderIdx}]])">
										리뷰 작성</button>
								</div>
							</div>
						</div>

						<!-- 리뷰할 거래가 없을 때 -->
						<div th:if="${#lists.isEmpty(reviewList)}"
							class="py-6 text-center text-sm text-gray-500 border border-gray-100 rounded-lg">
							리뷰할 거래가 없습니다</div>

					</div>

				</div>
			</div>

			<!-- 아래: 실제 리뷰 작성 폼 카드 (초기에는 숨김) -->
			<form id="reviewForm" action="/mypage/reviews/reviewWrite" method="post"
				th:style="${selectedBidIdx != null ? 'display: block;' : 'display: none;'}"
				class="border border-gray-200 bg-white rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)]">

				<input type="hidden" name="buyer_idx"
					th:value="${session.loginUser.memIdx}"> <input
					type="hidden" name="bid_idx" id="bid_idx" th:value="${selectedBidIdx}"> <input
					type="hidden" name="auction_idx" id="auction_idx" th:value="${selectedAuctionIdx}"> <input
					type="hidden" name="bidder_idx" id="bidder_idx" th:value="${selectedBidderIdx}">

				<div class="px-6 py-5 border-b border-gray-100">
					<h3 class="text-base sm:text-lg font-bold text-gray-900">리뷰 작성</h3>
					<p class="mt-1 text-xs sm:text-sm text-gray-600">선택한 거래에 대한 리뷰를
						작성해주세요</p>
				</div>

				<div class="px-6 py-6 space-y-4">
					<!-- 제목 -->
					<div class="space-y-1.5">
						<label for="reviewTitle" class="text-sm font-medium text-gray-900">
							리뷰 제목 </label> <input type="text" id="reviewTitle" name="reviewTitle"
							placeholder="리뷰 제목(5글자 이상)"
							class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm text-gray-900 bg-white focus:outline-none focus:ring-2 focus:ring-[#7CBD00]" />
					</div>

					<!-- 별점 -->
					<div class="space-y-1.5">
						<label class="text-sm font-medium text-gray-900">별점</label>
						<div id="stars" name="stars" class="flex gap-1 text-2xl cursor-pointer select-none">
							<span data-value="1"><i class="bi bi-star"></i></span> 
							<span data-value="2"><i class="bi bi-star"></i></span> 
							<span data-value="3"><i class="bi bi-star"></i></span> 
							<span data-value="4"><i class="bi bi-star"></i></span> 
							<span data-value="5"><i class="bi bi-star"></i></span>
						</div>
						<input type="hidden" name="reviewStar" id="reviewStar">
					</div>

					<!-- 내용 -->
					<div class="space-y-1.5">
						<label for="reviewContent"
							class="text-sm font-medium text-gray-900"> 리뷰 내용 </label>
						<textarea id="reviewContent" rows="8" cols="60" name="content"
							placeholder="리뷰를 작성해주세요(10글자 이상)"
							class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm text-gray-900 bg-white resize-none focus:outline-none focus:ring-2 focus:ring-[#7CBD00]"></textarea>
						<div id="contentCount" style="font-size: 12px; color: gray;">
							0 / 300자</div>
					</div>

					<!-- 제출 버튼 -->
					<div class="pt-2">
						<button type="submit" id="reviewSubmitBtn" disabled
							class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2.5 bg-[#7CBD00] text-white rounded-md text-sm font-semibold hover:bg-[#6BAD00] disabled:bg-gray-300 disabled:cursor-not-allowed">
							리뷰 남기기</button>
					</div>
				</div>

				<!-- 기존 JS들 그대로 유지 -->
				<script>
        // 검색 기능 disabled
        const keywordInput = document.querySelector('input[name="keyword"]');
        const searchBtn = document.getElementById('searchBtn');
        const searchType = document.querySelector('select[name="searchType"]');

        if (keywordInput && searchBtn && searchType) {
          keywordInput.addEventListener("input", function() {
            if (this.value.trim() === "" || searchType.value === "") {
              searchBtn.disabled = true;
            } else {
              searchBtn.disabled = false;
            }
          });
          searchType.addEventListener("change", function() {
            if (keywordInput.value.trim() === "" || searchType.value === "") {
              searchBtn.disabled = true;
            } else {
              searchBtn.disabled = false;
            }
          });
        }

        // 버튼 누르면 리뷰창 띄우기
        function selectItem(bidIdx, auctionIdx, bidderIdx) {
          document.getElementById("bid_idx").value = bidIdx;
          document.getElementById("auction_idx").value = auctionIdx;
          document.getElementById("bidder_idx").value = bidderIdx;

          document.getElementById("reviewForm").style.display = "block";
          document.getElementById("reviewForm").scrollIntoView({ behavior: "smooth" });
        }

				if (document.getElementById("bid_idx").value) {
				  document.getElementById("reviewForm").style.display = "block";
				}

        // 별점 부여 기능
        const stars = document.querySelectorAll("#stars span");
        const reviewStarInput = document.getElementById("reviewStar");

        stars.forEach(star => {
          star.addEventListener("click", function() {
            const value = this.getAttribute("data-value");
            reviewStarInput.value = value;

            stars.forEach((s, index) => {
              const icon = s.querySelector("i");

              if (index < value) {
                icon.className = "bi bi-star-fill";
                icon.style.color = "gold";
              } else {
                icon.className = "bi bi-star";
                icon.style.color = "gold";
              }
            });
          });
        });

        // 리뷰 제약조건 걸기
        const titleInput = document.getElementById("reviewTitle");
        const contentInput = document.getElementById("reviewContent");
        const reviewBtn = document.getElementById("reviewSubmitBtn");
        const contentCount = document.getElementById("contentCount");

        function checkReviewValid() {
          const title = titleInput.value.trim();
          const content = contentInput.value.trim();
          const length = content.length;

          contentCount.textContent = length + " / 300자";
          contentCount.style.color = length > 300 ? "red" : "gray";

          const isTitleValid = title.length >= 5;
          const isContentValid = content.length >= 10 && content.length <= 300;

          reviewBtn.disabled = !(isTitleValid && isContentValid);
        }

        titleInput.addEventListener("input", checkReviewValid);
        contentInput.addEventListener("input", checkReviewValid);
      </script>

			</form>

		</div>

	</div>
</body>
</html>
