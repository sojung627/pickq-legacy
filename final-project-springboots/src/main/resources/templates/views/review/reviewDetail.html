<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">
<head>
<meta charset="UTF-8">
<title>리뷰 상세 - PickQ</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>
.content-box {
	white-space: pre-wrap;
	word-break: break-all;
	padding: 10px;
	min-height: 100px;
	vertical-align: top;
}
</style>
</head>
<body>
	<div layout:fragment="content">

		<input type="hidden" name="review_idx" th:value="${reviewIdx}" />

		<div class="space-y-6">

			<!-- 상단 제목 카드 -->
			<div
				class="border border-gray-200 bg-white rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
				<div class="px-6 py-5 border-b border-gray-100">
					<h2 class="text-lg sm:text-xl font-bold text-gray-900">리뷰 상세</h2>
					<p class="mt-1 text-xs sm:text-sm text-gray-600">거래 정보와 리뷰 내용을
						확인할 수 있습니다</p>
				</div>

				<!-- 거래 정보 -->
				<div class="px-6 py-5 space-y-4">
					<div
						class="text-sm font-semibold text-gray-900 flex items-center gap-2">
						<span class="text-lg">📦</span> <span>거래 정보</span>
					</div>

					<div class="border border-gray-100 rounded-lg overflow-hidden">
						<table class="w-full text-sm">
							<tbody>
								<tr class="border-b border-gray-100">
									<th
										class="w-32 bg-gray-50 px-4 py-2 text-left text-gray-700 font-medium">
										경매 제목</th>
									<td class="px-4 py-2 text-gray-900"
										th:text="${review.auctionTitle}"></td>
								</tr>
								<tr class="border-b border-gray-100">
									<th
										class="bg-gray-50 px-4 py-2 text-left text-gray-700 font-medium">
										최종 입찰가</th>
									<td class="px-4 py-2 text-gray-900"><span
										th:text="${#numbers.formatInteger(review.auctionTargetPrice, 0, 'COMMA')}"></span>원
									</td>
								</tr>
								<tr class="border-b border-gray-100">
									<th
										class="bg-gray-50 px-4 py-2 text-left text-gray-700 font-medium">
										판매자</th>
									<td class="px-4 py-2 text-gray-900"
										th:text="${review.bidderName}"></td>
								</tr>
								<tr>
									<th
										class="bg-gray-50 px-4 py-2 text-left text-gray-700 font-medium">
										거래 일자</th>
									<td class="px-4 py-2 text-gray-900"
										th:text="${#temporals.format(review.bidRegdate, 'yyyy-MM-dd HH:mm')}"></td>
								</tr>
							</tbody>
						</table>
					</div>

					<!-- 리뷰 상세 -->
					<div class="pt-4 space-y-3">
						<div
							class="text-sm font-semibold text-gray-900 flex items-center gap-2">
							<span class="text-lg">💬</span> <span>리뷰 상세</span>
						</div>

						<div class="border border-gray-100 rounded-lg overflow-hidden">
							<table class="w-full text-sm align-top">
								<tbody>
									<tr class="border-b border-gray-100">
										<th
											class="w-32 bg-gray-50 px-4 py-2 text-left text-gray-700 font-medium">
											제목</th>
										<td class="px-4 py-2 text-gray-900"
											th:text="${review.reviewTitle}"></td>
									</tr>
									<tr class="border-b border-gray-100">
										<th
											class="bg-gray-50 px-4 py-2 text-left text-gray-700 font-medium">
											작성자</th>
										<td class="px-4 py-2 text-gray-900"
											th:text="${review.memName}"></td>
									</tr>
									<tr class="border-b border-gray-100">
										<th
											class="bg-gray-50 px-4 py-2 text-left text-gray-700 font-medium">
											별점</th>
										<td class="px-4 py-2 text-yellow-500"
											th:with="star=${review.reviewStar}"><span
											th:each="i : ${#numbers.sequence(1, star)}"> <i
												class="bi bi-star-fill" style="color: gold;"></i>
										</span> <span th:if="${star < 5}"
											th:each="i : ${#numbers.sequence(1, 5 - star)}"> <i
												class="bi bi-star" style="color: gold;"></i>
										</span></td>
									</tr>
									<tr class="border-b border-gray-100">
										<th
											class="bg-gray-50 px-4 py-2 text-left text-gray-700 font-medium">
											작성 일자</th>
										<td class="px-4 py-2 text-gray-900"
											th:text="${#temporals.format(review.reviewRegdate, 'yyyy-MM-dd HH:mm')}"></td>
									</tr>
									<tr>
										<th
											class="bg-gray-50 px-4 py-2 text-left text-gray-700 font-medium align-top">
											리뷰 내용</th>
										<td class="px-4 py-2 text-gray-900 content-box"
											th:text="${review.reviewContent}"></td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>

				</div>
			</div>

			<!-- 아래 버튼 -->
			<div>
				<input type="button" value="뒤로가기" onclick="history.go(-1)"
					class="inline-flex items-center px-4 py-2.5 rounded-md border border-gray-300 text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 cursor-pointer">
			</div>

		</div>

	</div>
</body>
</html>
