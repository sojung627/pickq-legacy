<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">
<head>
<meta charset="UTF-8">
<title>리뷰관리 - 마이페이지</title>

<!-- 별 아이콘용 -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
   <div layout:fragment="content">

      <form class="review" method="get">
         <!-- 내가 남긴 리뷰 영역 -->
         <div
            class="border border-gray-200 bg-white rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)] mb-6">
            <div
               class="px-6 py-5 border-b border-gray-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
               <div>
                  <h2 class="text-lg sm:text-xl font-bold text-gray-900">리뷰관리</h2>
                  <p class="mt-1 text-xs sm:text-sm text-gray-600">거래 후 작성한 리뷰
                     목록</p>
               </div>
               <!-- 관리자 전용 버튼 -->
               <div
                  th:if="${session.loginUser != null and ( session.loginUser.memRoleIdx == 2)}">
                  <button type="button"
                     class="inline-flex items-center px-4 py-2 rounded-md bg-[#222222] text-white text-xs sm:text-sm font-semibold hover:bg-black"
                     onclick="location.href='/reviewAdmin'">관리자 페이지</button>
               </div>
            </div>

            <div class="px-6 py-6 space-y-4">

               <!-- 내가 남긴 리뷰 리스트 -->
               <div th:if="${!#lists.isEmpty(reviewList)}" class="space-y-3">
                  <div th:each="review : ${reviewList}"
                     class="border border-gray-100 rounded-lg px-4 py-3 hover:border-[#7CBD00] transition-colors">
                     <div class="flex justify-between items-start gap-2 mb-1.5">
                        <div>
                           <h3 class="text-sm font-semibold text-gray-900"
                              th:text="${review.auctionTitle}">거래 제목</h3>
                           <p class="text-[11px] text-gray-500 mt-0.5">
                              상품명: <span th:text="${review.itemName}">상품명</span>
                           </p>
                        </div>
                        <div class="text-right text-xs text-yellow-500">
                           <!-- 별점 아이콘 그대로 구현 -->
                           <span th:with="star=${review.reviewStar}"> <span
                              th:each="i : ${#numbers.sequence(1, star)}"> <i
                                 class="bi bi-star-fill"></i>
                           </span> <span th:if="${star < 5}"
                              th:each="i : ${#numbers.sequence(1, 5 - star)}"> <i
                                 class="bi bi-star"></i>
                           </span>
                           </span>
                           <div class="text-[11px] text-gray-400 mt-0.5"
                              th:text="${#temporals.format(review.reviewRegdate, 'yyyy-MM-dd HH:mm')}">
                              2026-04-01 10:00</div>
                        </div>
                     </div>

                     <div class="mt-2 flex gap-2 justify-end">
                        <button type="button"
                           class="inline-flex items-center px-3 py-1.5 rounded-md border border-gray-300 text-xs sm:text-sm text-gray-700 hover:bg-gray-50"
                           th:onclick="|location.href='@{/mypage/reviews/reviewDetail(reviewIdx=${review.reviewIdx})}'|">
                           상세보기</button>
                        <button type="button"
                           th:if="${session.loginUser.memRoleIdx == 2}"
                           th:onclick="|location.href='@{/reviewDelete(reviewIdx=${review.reviewIdx})}'|"
                           class="inline-flex items-center px-3 py-1.5 rounded-md border border-red-300 text-xs sm:text-sm text-red-600 hover:bg-red-50">
                           삭제</button>
                     </div>
                  </div>
               </div>

               <!-- 내가 남긴 리뷰 없을 때 -->
               <div th:if="${#lists.isEmpty(reviewList)}"
                  class="py-10 text-center text-sm text-gray-500">작성한 리뷰가 없습니다
               </div>

               <!-- 리뷰 남기기 버튼 -->
               <div class="pt-2">
                  <input type="button" value="리뷰 남기기"
                     onclick="location.href='/mypage/reviews/reviewWrite'"
                     class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2.5 bg-[#7CBD00] text-white rounded-md text-sm font-semibold hover:bg-[#6BAD00] cursor-pointer">
               </div>

            </div>
         </div>

         <!-- 내가 받은 리뷰 + 평균 별점 영역 -->
         <div
            class="border border-gray-200 bg-white rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
            <div
               class="px-6 py-5 border-b border-gray-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
               <div>
                  <h3 class="text-base sm:text-lg font-bold text-gray-900">거래 후
                     내가 받은 리뷰</h3>
               </div>

               <div class="starAverage flex items-center gap-2 text-sm"
                  th:with="
                avg=${avgRating != null ? avgRating : 0.0},
                full=${T(java.lang.Math).floor(avg).intValue()},
                hasHalf=${avg - T(java.lang.Math).floor(avg) > 0},
                half=${hasHalf ? 1 : 0},
                empty=${5 - full - half}">
                  <span class="text-xs text-gray-500">평균 별점</span> <span
                     th:if="${full > 0}" th:each="i : ${#numbers.sequence(1, full)}">
                     <i class="bi bi-star-fill" style="color: gold;"></i>
                  </span> <span th:if="${half == 1}"> <i class="bi bi-star-half"
                     style="color: gold;"></i>
                  </span> <span th:if="${empty > 0}"
                     th:each="i : ${#numbers.sequence(1, empty)}"> <i
                     class="bi bi-star" style="color: gold;"></i>
                  </span> <span class="text-xs text-gray-500 ml-1"
                     th:text="${#numbers.formatDecimal(avg,1,1)}"> 0.0 </span>
               </div>
            </div>

            <div class="px-6 py-6">
               <!-- 받은 리뷰 리스트 -->
               <div th:if="${!#lists.isEmpty(receivedReviewList)}"
                  class="space-y-3">
                  <div th:each="review : ${receivedReviewList}"
                     class="border border-gray-100 rounded-lg px-4 py-3 hover:border-[#7CBD00] transition-colors">
                     <div class="flex justify-between items-start gap-2 mb-1.5">
                        <div>
                           <h4 class="text-sm font-semibold text-gray-900"
                              th:text="${review.auctionTitle}">거래 제목</h4>
                           <p class="text-[11px] text-gray-500 mt-0.5">
                              상품명: <span th:text="${review.itemName}">상품명</span>
                           </p>
                        </div>
                        <div class="text-right text-xs text-yellow-500">
                           <span th:with="star=${review.reviewStar}"> <span
                              th:each="i : ${#numbers.sequence(1, star)}"> <i
                                 class="bi bi-star-fill"></i>
                           </span> <span th:if="${star < 5}"
                              th:each="i : ${#numbers.sequence(1, 5 - star)}"> <i
                                 class="bi bi-star"></i>
                           </span>
                           </span>
                           <div class="text-[11px] text-gray-400 mt-0.5"
                              th:text="${#temporals.format(review.reviewRegdate, 'yyyy-MM-dd HH:mm')}">
                              2026-04-01 10:00</div>
                        </div>
                     </div>

                     <div class="mt-2 flex gap-2 justify-end">
                        <button type="button"
                           class="inline-flex items-center px-3 py-1.5 rounded-md border border-gray-300 text-xs sm:text-sm text-gray-700 hover:bg-gray-50"
                           th:onclick="|location.href='@{/mypage/reviews/reviewDetail(reviewIdx=${review.reviewIdx})}'|">
                           상세보기</button>
                        <button type="button"
                           th:if="${session.loginUser.memRoleIdx == 2}"
                           th:onclick="|location.href='@{/reviewDelete(reviewIdx=${review.reviewIdx})}'|"
                           class="inline-flex items-center px-3 py-1.5 rounded-md border border-red-300 text-xs sm:text-sm text-red-600 hover:bg-red-50">
                           삭제</button>
                     </div>
                  </div>
               </div>
               <!-- 받은 리뷰 없을 때 -->
               <div th:if="${#lists.isEmpty(receivedReviewList)}"
                  class="py-10 text-center text-sm text-gray-500">받은 리뷰가 없습니다
               </div>

            </div>
         </div>

      </form>

   </div>
</body>
</html>
