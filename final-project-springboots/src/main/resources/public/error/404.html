<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오류 - PickQ</title>
  <meta http-equiv="refresh" content="3;url=/" />
  <style>
    body { margin: 0; font-family: sans-serif; background: #f9fafb; color: #222; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 560px; width: 100%; background: #fff; border: 1px solid #e5e7eb; border-radius: 20px; padding: 28px; text-align: center; }
    .btn { display: inline-block; margin-top: 20px; padding: 10px 18px; border-radius: 9999px; text-decoration: none; background: #222; color: #fff; font-weight: 700; }
    .muted { color: #6b7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>페이지를 찾을 수 없습니다.</h1>
      <p class="muted">서비스 점검중입니다.</p>
      <p class="muted">3초 뒤 메인 화면으로 이동합니다.</p>
      <a class="btn" href="/">메인으로 돌아가기</a>
    </div>
  </div>
  <script>
    setTimeout(function () { location.href = '/'; }, 3000);
  </script>
</body>
</html>
